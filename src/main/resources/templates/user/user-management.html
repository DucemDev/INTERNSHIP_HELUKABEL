<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/main-layout :: layout(~{::main})}">
<body>
    <main class="space-y-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Quản lý Nhân sự</h1>
                <p class="mt-1 text-sm font-medium text-gray-500">Quản lý danh sách nhân viên và phân quyền truy cập hệ thống.</p>
            </div>
            <div class="flex items-center gap-3">
                <button class="inline-flex items-center gap-2 rounded-xl bg-helu-red px-5 py-2.5 text-sm font-bold text-white shadow-lg shadow-red-200 hover:bg-red-700 transition-all" onclick="openModal('add')">
                    <i data-lucide="user-plus" class="w-4 h-4"></i> Thêm nhân viên
                </button>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="rounded-2xl border border-helu-border bg-white p-6 shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 items-end">
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-400">Tìm kiếm nhân viên</label>
                    <div class="relative group">
                        <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 group-focus-within:text-helu-red transition-colors"></i>
                        <input type="text" id="searchInput" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 pl-10 pr-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" placeholder="Mã NV, Tên, Email..." onkeyup="filterUsers()">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-400">Vai trò</label>
                    <select id="roleFilter" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer" onchange="filterUsers()">
                        <option value="">Tất cả vai trò</option>
                        <option value="Admin">Admin</option>
                        <option value="Seller">Seller</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-400">Trạng thái</label>
                    <select id="statusFilter" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer" onchange="filterUsers()">
                        <option value="">Tất cả</option>
                        <option value="true">Đang hoạt động</option>
                        <option value="false">Đã khóa</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-400">Sắp xếp</label>
                    <select id="sortFilter" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer" onchange="filterUsers()">
                        <option value="name">Tên (A-Z)</option>
                        <option value="code">Mã NV</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="rounded-2xl border border-helu-border bg-white shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left" id="userTable">
                    <thead>
                        <tr class="border-b border-gray-100 bg-gray-50/50">
                            <th class="w-16 py-4 px-6 text-center text-xs font-bold uppercase tracking-wider text-gray-400">STT</th>
                            <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-gray-400">Mã NV</th>
                            <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-gray-400">Họ và Tên</th>
                            <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-gray-400">Email</th>
                            <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-gray-400">Vai trò</th>
                            <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-gray-400">Trạng thái</th>
                            <th class="py-4 px-6 text-right text-xs font-bold uppercase tracking-wider text-gray-400 pr-10">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="userBody" class="divide-y divide-gray-50">
                        <!-- Data loaded via JS -->
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="flex items-center justify-between border-t border-gray-100 bg-white px-6 py-4">
                <div class="text-sm font-medium text-gray-500" id="recordCount">
                    Hiển thị 0/0 bản ghi
                </div>
                <div class="flex items-center gap-2" id="paginationControls">
                    <!-- Pagination buttons generated via JS -->
                </div>
            </div>
        </div>

        <!-- User Modal -->
        <div id="userModal" class="fixed inset-0 z-[2000] hidden items-center justify-center bg-black/40 backdrop-blur-sm p-4">
            <div class="w-full max-w-xl rounded-3xl bg-white p-8 shadow-2xl animate-in fade-in zoom-in duration-200">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight" id="modalTitle">Thêm nhân sự mới</h2>
                    <button onclick="closeModal()" class="rounded-xl p-2 text-gray-400 hover:bg-gray-50 hover:text-helu-red transition-all">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                <form id="userForm" class="space-y-6">
                    <input type="hidden" id="userId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700">Mã nhân viên <span class="text-helu-red">*</span></label>
                            <input type="text" id="userCode" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" required placeholder="VD: NV001">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700">Vai trò <span class="text-helu-red">*</span></label>
                            <select id="roleId" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer" required></select>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700">Họ và Tên <span class="text-helu-red">*</span></label>
                        <input type="text" id="fullName" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" required placeholder="Nhập đầy đủ họ tên">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700">Email <span class="text-helu-red">*</span></label>
                        <input type="email" id="email" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" required placeholder="username@helukabel.vn">
                    </div>
                    <div id="passwordField" class="space-y-2">
                        <label class="text-sm font-bold text-gray-700">Mật khẩu <span class="text-helu-red">*</span></label>
                        <input type="password" id="password" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" placeholder="Để trống nếu không muốn thay đổi">
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="isActive" checked class="h-5 w-5 rounded-md border-gray-200 text-helu-red focus:ring-helu-red cursor-pointer">
                        <label for="isActive" class="text-sm font-bold text-gray-700 cursor-pointer">Kích hoạt tài khoản</label>
                    </div>
                    <div class="flex items-center justify-end gap-3 pt-4">
                        <button type="button" class="rounded-xl px-6 py-2.5 text-sm font-bold text-gray-500 hover:bg-gray-50 transition-all" onclick="closeModal()">Hủy bỏ</button>
                        <button type="submit" class="rounded-xl bg-helu-red px-6 py-2.5 text-sm font-bold text-white shadow-lg shadow-red-200 hover:bg-red-700 transition-all">Lưu thông tin</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            const apiBase = '/api/users';
            let allUsers = [];
            let filteredUsers = [];
            let currentPage = 1;
            const pageSize = 10;

            async function fetchUsers() {
                try {
                    const res = await fetch(apiBase);
                    allUsers = await res.json();
                    filteredUsers = [...allUsers];
                    renderUsers();
                } catch (error) { console.error(error); }
            }

            function renderUsers() {
                const tbody = document.getElementById('userBody');
                tbody.innerHTML = '';
                
                const start = (currentPage - 1) * pageSize;
                const end = start + pageSize;
                const pagedUsers = filteredUsers.slice(start, end);

                pagedUsers.forEach((user, index) => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50/50 transition-colors";
                    
                    const roleBadgeClass = user.roleName === 'Admin' ? 'bg-blue-50 text-blue-600' : 'bg-emerald-50 text-emerald-600';
                    const statusBadgeClass = user.isActive ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600';

                    tr.innerHTML = `
                        <td class="py-4 px-6 text-center text-sm font-medium text-gray-400">${start + index + 1}</td>
                        <td class="py-4 px-6 text-sm font-extrabold text-gray-900">${user.userCode}</td>
                        <td class="py-4 px-6">
                            <div class="flex items-center gap-3">
                                <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-helu-red font-bold text-white text-xs shadow-sm">${user.fullName ? user.fullName.charAt(0) : '?'}</div>
                                <span class="text-sm font-bold text-gray-800">${user.fullName}</span>
                            </div>
                        </td>
                        <td class="py-4 px-6 text-sm font-medium text-gray-500">${user.email}</td>
                        <td class="py-4 px-6">
                            <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-[11px] font-bold uppercase tracking-wider ${roleBadgeClass}">
                                ${user.roleName}
                            </span>
                        </td>
                        <td class="py-4 px-6">
                            <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-[11px] font-bold uppercase tracking-wider ${statusBadgeClass}">
                                ${user.isActive ? 'Đang hoạt động' : 'Đã khóa'}
                            </span>
                        </td>
                        <td class="py-4 px-6 text-right pr-10">
                            <div class="flex items-center justify-end gap-2">
                                <button class="rounded-lg p-2 text-gray-400 hover:bg-gray-100 hover:text-gray-900 transition-all" onclick="viewUserDetail('${user.userId}')" title="Xem chi tiết">
                                    <i data-lucide="eye" class="w-4 h-4"></i>
                                </button>
                                <button class="rounded-lg p-2 text-gray-400 hover:bg-rose-50 hover:text-rose-600 transition-all" onclick="deleteUser('${user.userId}')" title="Xóa">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                
                document.getElementById('recordCount').innerText = `Hiển thị ${filteredUsers.length > 0 ? start + 1 : 0}-${Math.min(end, filteredUsers.length)}/${filteredUsers.length} bản ghi`;
                renderPagination();
                lucide.createIcons();
            }

            function renderPagination() {
                const controls = document.getElementById('paginationControls');
                controls.innerHTML = '';
                const totalPages = Math.ceil(filteredUsers.length / pageSize);
                
                if (totalPages <= 1) return;

                // Previous
                const prevBtn = document.createElement('button');
                prevBtn.className = `inline-flex h-9 w-9 items-center justify-center rounded-lg border border-gray-200 transition-all ${currentPage === 1 ? 'text-gray-200 cursor-not-allowed' : 'text-gray-400 hover:bg-gray-50'}`;
                prevBtn.innerHTML = '<i data-lucide="chevron-left" class="w-4 h-4"></i>';
                if (currentPage > 1) prevBtn.onclick = () => { currentPage--; renderUsers(); };
                controls.appendChild(prevBtn);

                // Page numbers
                for (let i = 1; i <= totalPages; i++) {
                    const pageBtn = document.createElement('button');
                    pageBtn.className = `inline-flex h-9 w-9 items-center justify-center rounded-lg text-sm font-bold transition-all ${currentPage === i ? 'bg-helu-red text-white shadow-md shadow-red-100' : 'border border-gray-200 text-gray-400 hover:bg-gray-50'}`;
                    pageBtn.innerText = i;
                    pageBtn.onclick = () => { currentPage = i; renderUsers(); };
                    controls.appendChild(pageBtn);
                }

                // Next
                const nextBtn = document.createElement('button');
                nextBtn.className = `inline-flex h-9 w-9 items-center justify-center rounded-lg border border-gray-200 transition-all ${currentPage === totalPages ? 'text-gray-200 cursor-not-allowed' : 'text-gray-400 hover:bg-gray-50'}`;
                nextBtn.innerHTML = '<i data-lucide="chevron-right" class="w-4 h-4"></i>';
                if (currentPage < totalPages) nextBtn.onclick = () => { currentPage++; renderUsers(); };
                controls.appendChild(nextBtn);
                
                lucide.createIcons();
            }

            function viewUserDetail(id) {
                window.location.href = `/users/${id}`;
            }

            function filterUsers() {
                const search = document.getElementById('searchInput').value.toLowerCase();
                const role = document.getElementById('roleFilter').value;
                const status = document.getElementById('statusFilter').value;
                const sort = document.getElementById('sortFilter').value;

                filteredUsers = allUsers.filter(u => {
                    const matchesSearch = u.fullName.toLowerCase().includes(search) || 
                                          u.userCode.toLowerCase().includes(search) ||
                                          u.email.toLowerCase().includes(search);
                    const matchesRole = !role || u.roleName === role;
                    const matchesStatus = status === "" || String(u.isActive) === status;
                    return matchesSearch && matchesRole && matchesStatus;
                });

                if (sort === 'name') filteredUsers.sort((a, b) => a.fullName.localeCompare(b.fullName));
                else filteredUsers.sort((a, b) => a.userCode.localeCompare(b.userCode));

                currentPage = 1;
                renderUsers();
            }

            async function openModal(mode, id = null) {
                const modal = document.getElementById('userModal');
                const form = document.getElementById('userForm');
                const title = document.getElementById('modalTitle');
                form.reset();
                document.getElementById('userId').value = '';
                
                await loadRoles();

                if (mode === 'edit' && id) {
                    title.innerText = 'Cập nhật nhân sự';
                    const user = allUsers.find(u => u.userId === id);
                    if (user) {
                        document.getElementById('userId').value = user.userId;
                        document.getElementById('userCode').value = user.userCode;
                        document.getElementById('fullName').value = user.fullName;
                        document.getElementById('email').value = user.email;
                        document.getElementById('roleId').value = user.roleId;
                        document.getElementById('isActive').checked = user.isActive;
                    }
                } else {
                    title.innerText = 'Thêm nhân sự mới';
                }
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            }

            async function loadRoles() {
                try {
                    const res = await fetch('/api/roles');
                    const roles = await res.json();
                    const select = document.getElementById('roleId');
                    select.innerHTML = roles.map(r => `<option value="${r.roleId}">${r.roleName}</option>`).join('');
                } catch (e) { console.error(e); }
            }

            function closeModal() { 
                const modal = document.getElementById('userModal');
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }

            document.getElementById('userForm').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('userId').value;
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${apiBase}/${id}` : apiBase;

                const data = {
                    userCode: document.getElementById('userCode').value,
                    fullName: document.getElementById('fullName').value,
                    email: document.getElementById('email').value,
                    roleId: document.getElementById('roleId').value,
                    isActive: document.getElementById('isActive').checked
                };
                
                const pwd = document.getElementById('password').value;
                if (pwd) data.password = pwd;

                try {
                    const res = await fetch(url, {
                        method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    if (res.ok) { closeModal(); fetchUsers(); }
                } catch (err) { console.error(err); }
            };

            async function deleteUser(id) {
                if (confirm('Bạn có muốn xóa nhân viên này?')) {
                    try {
                        const res = await fetch(`${apiBase}/${id}`, { method: 'DELETE' });
                        if (res.ok) fetchUsers();
                    } catch (err) { console.error(err); }
                }
            }

            document.addEventListener('DOMContentLoaded', fetchUsers);
        </script>
    </main>
</body>
</html>
