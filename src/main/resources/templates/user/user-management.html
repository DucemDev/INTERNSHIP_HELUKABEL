<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý Nhân sự - HELUKABEL</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }
        .data-table th, .data-table td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--medium-gray);
        }
        .data-table th {
            background-color: var(--dark-black);
            color: var(--white);
        }
        .data-table tr:hover { background-color: #f9f9f9; }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: var(--white);
            margin: 10% auto;
            padding: 2rem;
            width: 500px;
            border-radius: 8px;
            border-top: 5px solid var(--primary-red);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .status-active { color: #2e7d32; font-weight: bold; }
        .status-inactive { color: #c62828; font-weight: bold; }
        .action-btns { display: flex; gap: 0.5rem; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">HELUKABEL | USERS</div>
        <div>
            <a href="/admin">Dashboard</a>
            <a href="/users">Nhân sự</a>
            <a href="/leads">Leads</a>
            <form th:action="@{/logout}" method="post" style="display: inline; margin-left: 1.5rem;">
                <button type="submit" class="btn btn-black" style="padding: 0.4rem 0.8rem;">Đăng xuất</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h1>Quản lý Nhân sự (Sellers/Staff)</h1>
            <button class="btn btn-primary" onclick="openModal('add')">+ Thêm tài khoản mới</button>
        </div>

        <div style="margin-bottom: 1rem; display: flex; gap: 1rem;">
            <input type="text" id="searchInput" class="form-control" placeholder="Tìm theo Mã nhân viên (user_code) hoặc Tên..." style="max-width: 400px;">
            <button class="btn btn-black" onclick="searchUsers()">Tìm kiếm</button>
        </div>

        <table class="data-table" id="userTable">
            <thead>
                <tr>
                    <th>Mã nhân viên</th>
                    <th>Họ và Tên</th>
                    <th>Email</th>
                    <th>Vai trò</th>
                    <th>Trạng thái</th>
                    <th>Ngày tạo</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="userBody">
                <!-- Data loaded via JS -->
            </tbody>
        </table>
    </div>

    <!-- Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm người dùng</h2>
                <span style="cursor:pointer; font-size:1.5rem;" onclick="closeModal()">&times;</span>
            </div>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label>Mã nhân viên (user_code)</label>
                    <input type="text" id="userCode" class="form-control" required placeholder="Ví dụ: EMP0001">
                </div>
                <div class="form-group">
                    <label>Họ và Tên</label>
                    <input type="text" id="fullName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group" id="passwordGroup">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" class="form-control">
                </div>
                <div class="form-group">
                    <label>Vai trò</label>
                    <select id="roleId" class="form-control" required></select>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="isActive" checked> Đang hoạt động
                    </label>
                </div>
                <div style="text-align: right; margin-top: 1rem;">
                    <button type="button" class="btn btn-black" onclick="closeModal()">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const apiBase = '/api/users';
        let currentRoles = [];

        document.addEventListener('DOMContentLoaded', () => {
            fetchRoles();
            fetchUsers();
            
            document.getElementById('userForm').addEventListener('submit', (e) => {
                e.preventDefault();
                saveUser();
            });

            // Gắn sự kiện enter cho ô tìm kiếm
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchUsers();
            });
        });

        async function fetchRoles() {
            const res = await fetch('/api/roles');
            currentRoles = await res.json();
            const select = document.getElementById('roleId');
            select.innerHTML = '<option value="">-- Chọn vai trò --</option>';
            currentRoles.forEach(role => {
                const opt = document.createElement('option');
                opt.value = role.roleId;
                opt.text = role.roleName;
                select.add(opt);
            });
        }

        async function fetchUsers() {
            try {
                const res = await fetch(apiBase);
                const users = await res.json();
                renderUsers(users);
            } catch (error) {
                console.error('Lỗi tải danh sách người dùng:', error);
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('userBody');
            tbody.innerHTML = '';
            users.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${user.userCode}</strong></td>
                    <td>${user.fullName}</td>
                    <td>${user.email}</td>
                    <td>${user.roleName}</td>
                    <td><span class="${user.isActive ? 'status-active' : 'status-inactive'}">${user.isActive ? 'Active' : 'Locked'}</span></td>
                    <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                    <td class="action-btns">
                        <button class="btn btn-black btn-sm" onclick="editUser('${user.userId}')">Sửa</button>
                        <button class="btn btn-primary btn-sm" onclick="deleteUser('${user.userId}')">Xóa</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openModal(mode) {
            document.getElementById('userModal').style.display = 'block';
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('userCode').readOnly = false;
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('modalTitle').innerText = 'Thêm nhân sự mới';
        }

        function closeModal() {
            document.getElementById('userModal').style.display = 'none';
        }

        async function editUser(id) {
            const res = await fetch(`${apiBase}/${id}`);
            const user = await res.json();
            
            document.getElementById('userId').value = user.userId;
            document.getElementById('userCode').value = user.userCode;
            document.getElementById('userCode').readOnly = true; // Thường mã NV không đổi khi sửa
            document.getElementById('fullName').value = user.fullName;
            document.getElementById('email').value = user.email;
            document.getElementById('isActive').checked = user.isActive;
            
            const role = currentRoles.find(r => r.roleName === user.roleName);
            if (role) document.getElementById('roleId').value = role.roleId;

            document.getElementById('passwordGroup').style.display = 'none';
            document.getElementById('modalTitle').innerText = 'Chỉnh sửa nhân sự';
            document.getElementById('userModal').style.display = 'block';
        }

        async function saveUser() {
            const id = document.getElementById('userId').value;
            const data = {
                userCode: document.getElementById('userCode').value,
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                roleId: document.getElementById('roleId').value,
                isActive: document.getElementById('isActive').checked
            };

            if (!id) {
                data.password = document.getElementById('password').value || '123';
            }

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${apiBase}/${id}` : apiBase;

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                closeModal();
                fetchUsers();
                alert('Thành công!');
            } else {
                alert('Có lỗi xảy ra khi lưu!');
            }
        }

        async function deleteUser(id) {
            if (confirm('Xóa nhân viên này?')) {
                await fetch(`${apiBase}/${id}`, { method: 'DELETE' });
                fetchUsers();
            }
        }

        function searchUsers() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#userBody tr');
            rows.forEach(row => {
                const userCode = row.cells[0].innerText.toLowerCase();
                const fullName = row.cells[1].innerText.toLowerCase();
                if (userCode.includes(keyword) || fullName.includes(keyword)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
