<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập - HELUKABEL CRM</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        helu: {
                            red: '#f6171b',
                            dark: '#1a1a1a',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="font-['Inter'] antialiased flex items-center justify-center min-h-screen p-6 relative overflow-hidden">
<!-- Glowing Glassmorphism Background Orbs -->
<div class="bg-glow-orb w-[500px] h-[500px] bg-red-200/30 -top-40 -left-40"></div>
<div class="bg-glow-orb w-[600px] h-[600px] bg-blue-200/20 -bottom-40 -right-40" style="animation-duration: 25s; animation-direction: reverse;"></div>

<div class="relative w-full max-w-xl z-10">
    <div class="glass-panel rounded-[2.5rem] px-10 py-6 border border-white/60 shadow-[0_20px_50px_rgba(31,38,135,0.04)] overflow-hidden">
        <!-- Branding -->
        <div class="text-center mb-6">
            <img th:src="@{/images/helu-logo.png}" alt="HELUKABEL" class="h-8 w-auto mx-auto mb-3">
            <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight uppercase">Hệ Thống Quản Trị</h2>
            <p class="text-[13px] font-medium text-gray-400 mt-0.5">Vui lòng đăng nhập để tiếp tục</p>
        </div>

        <!-- Alerts -->
        <div th:if="${param.error}" class="mb-4 p-3 rounded-2xl bg-red-50 border border-red-100 flex items-center gap-3 text-red-600 animate-in fade-in zoom-in duration-300">
            <i data-lucide="alert-circle" class="w-4 h-4"></i>
            <span class="text-xs font-bold">Sai email hoặc mật khẩu</span>
        </div>

        <div th:if="${param.logout}" class="mb-4 p-3 rounded-2xl bg-emerald-50 border border-emerald-100 flex items-center gap-3 text-emerald-600 animate-in fade-in zoom-in duration-300">
            <i data-lucide="check-circle-2" class="w-4 h-4"></i>
            <span class="text-xs font-bold">Đăng xuất thành công</span>
        </div>

        <form th:action="@{/login}" method="post" class="space-y-4">
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 ml-1">Tài khoản Email</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-gray-400 group-focus-within:text-helu-red transition-colors">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </div>
                    <input type="email" name="username" id="username" class="h-12 w-full rounded-2xl pl-14 pr-5 text-sm font-semibold outline-none glass-input focus:bg-white/90 shadow-sm" placeholder="admin@helukabel.vn" required autofocus/>
                </div>
            </div>

            <div class="space-y-1.5">
                <div class="flex justify-between items-center ml-1">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Mật khẩu</label>
                    <a href="#" class="text-[9px] font-bold text-helu-red hover:text-red-700 transition-colors uppercase tracking-tight">Quên mật khẩu?</a>
                </div>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-gray-400 group-focus-within:text-helu-red transition-colors">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </div>
                    <input type="password" name="password" id="password" class="h-12 w-full rounded-2xl pl-14 pr-5 text-sm font-semibold outline-none glass-input focus:bg-white/90 shadow-sm" placeholder="••••••••" required/>
                </div>
            </div>

            <div class="pt-1">
                <button type="submit" class="group relative h-12 w-full overflow-hidden rounded-2xl bg-helu-red text-sm font-bold text-white shadow-xl shadow-red-100 transition-all hover:scale-[1.01] hover:shadow-red-200 active:scale-[0.99] uppercase tracking-widest">
                        <span class="relative z-10 flex items-center justify-center gap-2">
                            Đăng Nhập Hệ Thống
                            <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </span>
                    <div class="absolute inset-0 z-0 bg-gradient-to-r from-transparent via-white/10 to-transparent transition-transform duration-500 -translate-x-full group-hover:translate-x-full"></div>
                </button>
            </div>
        </form>

        <!-- Test Accounts -->
        <div class="mt-5 pt-5 border-t border-gray-50">
            <div class="flex items-center gap-3 mb-3">
                <div class="h-px flex-1 bg-gray-100"></div>
                <span class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Tài khoản thử nghiệm</span>
                <div class="h-px flex-1 bg-gray-100"></div>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="p-2.5 bg-white/30 backdrop-blur-md rounded-xl border border-white/50 flex flex-col justify-center test-account hover:bg-white/50 transition-all" data-username="admin@helukabel.vn" data-password="123">
                    <p class="text-[9px] font-bold text-gray-400 uppercase mb-0.5">Quản trị</p>
                    <p class="text-[10px] font-semibold text-gray-600">admin@helukabel.vn | 123</p>
                    <button type="button" class="mt-2 text-xs font-medium text-helu-red hover:underline" onclick="fillCredentials(this)">Sử dụng</button>
                </div>
                 <div class="p-2.5 bg-white/30 backdrop-blur-md rounded-xl border border-white/50 flex flex-col justify-center test-account hover:bg-white/50 transition-all" data-username="seller_lan@helukabel.vn" data-password="123">
                    <p class="text-[9px] font-bold text-gray-400 uppercase mb-0.5">Nhân viên</p>
                    <p class="text-[10px] font-semibold text-gray-600">seller_lan@helukabel.vn | 123</p>
                    <button type="button" class="mt-2 text-xs font-medium text-helu-red hover:underline" onclick="fillCredentials(this)">Sử dụng</button>
                </div>
            </div>

            <a th:href="@{/}" class="flex items-center justify-center gap-2 w-full py-2.5 rounded-xl border border-gray-100 text-[10px] font-bold text-gray-400 hover:bg-gray-50 hover:text-helu-red transition-all uppercase tracking-widest">
                <i data-lucide="arrow-left" class="w-3 h-3"></i>
                Về trang chủ
            </a>
        </div>
    </div>


</div>

<script>
    lucide.createIcons();
    function fillCredentials(btn) {
        const container = btn.closest('.test-account');
        const username = container.dataset.username;
        const password = container.dataset.password;
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        if (usernameInput && passwordInput) {
            usernameInput.value = username;
            passwordInput.value = password;
        }
    }
</script>
</body>
</html>
