<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - INTERNSHIP 2026</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background-color: #1a1a1a;">
    <div class="login-box">
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <span class="logo">HELUKABEL</span>
        </div>
        <h2>ĐĂNG NHẬP</h2>
        
        <div th:if="${param.error}" class="alert alert-danger">
            Email hoặc mật khẩu không chính xác.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            Bạn đã đăng xuất thành công.
        </div>
        
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="text" name="username" class="form-control" placeholder="admin@helukabel.vn" required autofocus/>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" class="form-control" placeholder="******" required/>
            </div>
            <div style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%;">VÀO HỆ THỐNG</button>
            </div>
        </form>

        <span>admin@helukabel.vn | password: 123</span>
        <span>thanh0@helukabel.vn | password: 123</span>
    </div>
</body>
</html>
