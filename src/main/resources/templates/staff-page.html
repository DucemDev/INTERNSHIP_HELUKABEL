<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Staff Dashboard - INTERNSHIP 2026</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav>
        <div class="logo">HELUKABEL | STAFF</div>
        <div>
            <a href="/staff">Cá nhân</a>
            <a href="/api/leads" target="_blank">Danh sách Leads</a>
            <form th:action="@{/logout}" method="post" style="display: inline; margin-left: 1.5rem;">
                <button type="submit" class="btn btn-black" style="padding: 0.4rem 0.8rem;">Đăng xuất</button>
            </form>
        </div>
    </nav>

    <div class="container" style="border-top: 5px solid var(--dark-black);">
        <h1>Trang Nhân Viên (Staff)</h1>
        <p style="color: #666; margin-bottom: 2.5rem;">Chào mừng bạn quay lại. Hãy cập nhật tiến độ công việc hôm nay.</p>

        <div class="dashboard-grid">
            <div class="card" style="border-left-color: var(--dark-black);">
                <h3>Leads của tôi</h3>
                <div class="value">25</div>
                <p>Đang theo dõi</p>
            </div>
            <div class="card" style="border-left-color: var(--primary-red);">
                <h3>Chỉ tiêu Won</h3>
                <div class="value">5/10</div>
                <p>Tháng này</p>
            </div>
            <div class="card" style="border-left-color: var(--medium-gray);">
                <h3>Hoạt động gần đây</h3>
                <div class="value">12</div>
                <p>Tương tác trong ngày</p>
            </div>
        </div>

        <div style="margin-top: 3rem;">
            <h2>Thao tác nhanh</h2>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <a href="/api/leads" class="btn btn-primary">Thêm Lead mới</a>
                <button class="btn btn-black">Gửi báo cáo ngày</button>
            </div>
        </div>
    </div>
</body>
</html>
