<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELUKABEL CRM Portal</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        helu: {
                            red: '#f6171b',
                            dark: '#1a1a1a',
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Inertia Cursor Glow Background */
        #glow-bg {
            background: radial-gradient(circle 350px at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(246, 23, 27, 0.12), rgba(30, 41, 59, 0.04) 70%, transparent 100%);
            will-change: transform;
        }
        /* Mock browser window style */
        .browser-mockup {
            box-shadow: 0 25px 60px -15px rgba(15, 23, 42, 0.12);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body class="antialiased bg-slate-50/70 text-slate-600 h-screen overflow-hidden flex flex-col relative">

    <!-- Dynamic Hover Interactive Particle Network Canvas -->
    <canvas id="particle-canvas" class="fixed inset-0 pointer-events-none z-0"></canvas>

    <!-- Interactive Glow Background (Smooth Lerping) -->
    <div id="glow-bg" class="fixed inset-0 pointer-events-none z-10 opacity-70"></div>

    <!-- NAVIGATION -->
    <nav class="w-full bg-white border-b border-slate-100 flex-none z-50 relative">
        <div class="max-w-7xl mx-auto px-8 h-16 flex items-center justify-between">
            <img th:src="@{/images/helu-logo.png}" alt="HELUKABEL" class="h-5 w-auto object-contain">
            <a th:href="@{/login}" class="px-5 py-2 bg-slate-900 hover:bg-helu-red text-white text-xs font-bold rounded-lg transition-all active:scale-95">
                Đăng nhập
            </a>
        </div>
    </nav>

    <!-- MAIN SECTION -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-8 py-4 flex flex-col lg:flex-row items-center justify-center gap-10 lg:gap-12 overflow-hidden z-20 relative">
        
        <!-- Left Side: Corporate Portal Info -->
        <div class="w-full lg:w-5/12 space-y-6 text-left">
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-slate-100 rounded-lg text-slate-700 text-[10px] font-bold tracking-wider uppercase border border-slate-200">
                Hệ thống CRM Nội bộ
            </div>
            <h1 class="text-3xl md:text-4xl lg:text-5xl font-black text-slate-950 tracking-tight leading-[1.15]">
                Hệ thống CRM <br>
                <span class="text-helu-red">HELU</span>
            </h1>
            <p class="text-sm md:text-base text-slate-500 leading-relaxed max-w-lg font-medium">
                Hệ thống quản trị khách hàng, đánh giá Leads và phân tích hiệu suất kinh doanh của HELUKABEL.
            </p>
            <div class="pt-2">
                <a th:href="@{/login}" id="magnetic-btn" class="inline-flex items-center gap-2.5 px-7 py-3.5 bg-helu-red text-white text-sm font-bold rounded-xl shadow-lg shadow-red-200 hover:bg-red-700 transition-all duration-200 active:scale-95 ease-out">
                    Bắt đầu làm việc
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </a>
            </div>
        </div>

        <!-- Right Side: Simple Slideshow Showcase -->
        <div class="w-full lg:w-7/12 flex items-center justify-center overflow-hidden max-h-[70vh]">
            <div id="slideshow-container" class="relative w-full bg-white rounded-2xl p-1 shadow-[0_20px_50px_rgba(0,0,0,0.06)] border border-slate-100/80 overflow-hidden group transition-all duration-300 ease-out" style="transform-style: preserve-3d; transform: perspective(1000px) rotateX(0deg) rotateY(0deg);">
                <div class="relative rounded-xl overflow-hidden aspect-[16/10] md:aspect-[21/13] pointer-events-none">
                    <img th:src="@{/images/index1.png}" class="absolute inset-0 w-full h-full object-cover object-top slide opacity-100 scale-100 translate-x-0 transition-all duration-700 ease-out" alt="Dashboard View 1">
                    <img th:src="@{/images/index2.png}" class="absolute inset-0 w-full h-full object-cover object-top slide opacity-0 scale-95 translate-x-8 transition-all duration-700 ease-out" alt="Dashboard View 2">
                    <img th:src="@{/images/index3.png}" class="absolute inset-0 w-full h-full object-cover object-top slide opacity-0 scale-95 translate-x-8 transition-all duration-700 ease-out" alt="Dashboard View 3">
                    <img th:src="@{/images/index4.png}" class="absolute inset-0 w-full h-full object-cover object-top slide opacity-0 scale-95 translate-x-8 transition-all duration-700 ease-out" alt="Dashboard View 4">
                </div>
                
                <!-- Navigation Dots -->
                <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2 z-10 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    <button class="w-2 h-2 rounded-full bg-white/40 hover:bg-white transition-all dot bg-white ring-2 ring-black/5"></button>
                    <button class="w-2 h-2 rounded-full bg-white/20 hover:bg-white transition-all dot ring-2 ring-black/5"></button>
                    <button class="w-2 h-2 rounded-full bg-white/20 hover:bg-white transition-all dot ring-2 ring-black/5"></button>
                    <button class="w-2 h-2 rounded-full bg-white/20 hover:bg-white transition-all dot ring-2 ring-black/5"></button>
                </div>
            </div>
        </div>

    </main>

    <!-- FOOTER (Ultra Compact) -->
    <footer class="w-full bg-white border-t border-slate-100 py-4 flex-none z-20 relative">
        <div class="max-w-7xl mx-auto px-8 flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
            <span>&copy; 2026 HELUKABEL VIETNAM</span>
            <div class="flex gap-6">
                <a href="#" class="hover:text-helu-red transition-colors">Bảo mật</a>
                <a href="#" class="hover:text-helu-red transition-colors">Hỗ trợ</a>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        // Mouse coordinates for tracking
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let glowX = mouseX;
        let glowY = mouseY;
        let isMouseActive = false;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            isMouseActive = true;
        });

        window.addEventListener('mouseleave', () => {
            isMouseActive = false;
        });

        // 1. Inertia Glow Background Effect
        function updateGlowPosition() {
            // Smooth LERP (inertia drag)
            glowX += (mouseX - glowX) * 0.08;
            glowY += (mouseY - glowY) * 0.08;
            
            const glow = document.getElementById('glow-bg');
            if (glow) {
                glow.style.setProperty('--mouse-x', `${glowX}px`);
                glow.style.setProperty('--mouse-y', `${glowY}px`);
            }
            requestAnimationFrame(updateGlowPosition);
        }
        updateGlowPosition();

        // 2. Interactive Constellation Particle Canvas
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Create particles
        const particles = [];
        const particleCount = 45;

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                radius: Math.random() * 2 + 1.2,
                originalVx: 0,
                originalVy: 0
            });
            particles[i].originalVx = particles[i].vx;
            particles[i].originalVy = particles[i].vy;
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw connections
            for (let i = 0; i < particles.length; i++) {
                const p1 = particles[i];
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 130) {
                        const alpha = (1 - dist / 130) * 0.15;
                        ctx.strokeStyle = `rgba(148, 163, 184, ${alpha})`;
                        ctx.lineWidth = 0.8;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }

            // Update & Draw particles
            particles.forEach(p => {
                // Update position
                p.x += p.vx;
                p.y += p.vy;

                // Mouse interaction: push away/repel
                if (isMouseActive) {
                    const dx = p.x - mouseX;
                    const dy = p.y - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const repelRadius = 140;

                    if (dist < repelRadius) {
                        const force = (repelRadius - dist) / repelRadius;
                        const angle = Math.atan2(dy, dx);
                        
                        // Push away from mouse
                        p.x += Math.cos(angle) * force * 3.5;
                        p.y += Math.sin(angle) * force * 3.5;
                    }
                }

                // Smoothly return velocity to normal
                p.vx += (p.originalVx - p.vx) * 0.05;
                p.vy += (p.originalVy - p.vy) * 0.05;

                // Boundary collision
                if (p.x < 0 || p.x > canvas.width) {
                    p.vx = -p.vx;
                    p.originalVx = -p.originalVx;
                }
                if (p.y < 0 || p.y > canvas.height) {
                    p.vy = -p.vy;
                    p.originalVy = -p.originalVy;
                }

                // Draw particle
                ctx.fillStyle = 'rgba(148, 163, 184, 0.35)';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // 3. Slideshow Logic
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        let slideInterval;

        function showSlide(n) {
            slides.forEach(slide => {
                slide.classList.replace('opacity-100', 'opacity-0');
                slide.classList.replace('scale-100', 'scale-95');
                slide.classList.remove('translate-x-0');
                slide.classList.add('translate-x-8');
            });
            dots.forEach(dot => {
                dot.classList.remove('bg-white');
                dot.classList.add('bg-white/20');
            });

            currentSlide = (n + slides.length) % slides.length;
            
            const activeSlide = slides[currentSlide];
            activeSlide.classList.replace('opacity-0', 'opacity-100');
            activeSlide.classList.replace('scale-95', 'scale-100');
            activeSlide.classList.remove('translate-x-8');
            activeSlide.classList.add('translate-x-0');

            dots[currentSlide].classList.add('bg-white');
            dots[currentSlide].classList.remove('bg-white/20');
        }

        function startSlideshow() {
            slideInterval = setInterval(() => {
                showSlide(currentSlide + 1);
            }, 3500);
        }

        function resetSlideshow() {
            clearInterval(slideInterval);
            startSlideshow();
        }

        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                showSlide(index);
                resetSlideshow();
            });
        });

        startSlideshow();

        // 4. 3D Tilt Effect on Slideshow Container
        const tiltContainer = document.getElementById('slideshow-container');
        if (tiltContainer) {
            tiltContainer.addEventListener('mousemove', (e) => {
                const rect = tiltContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const maxRotateX = 5;
                const maxRotateY = 5;
                
                const rotateX = ((centerY - y) / centerY) * maxRotateX;
                const rotateY = ((x - centerX) / centerX) * maxRotateY;
                
                tiltContainer.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.025)`;
            });
            
            tiltContainer.addEventListener('mouseleave', () => {
                tiltContainer.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
            });
        }

        // 5. Magnetic Button Effect (Attracts 'Bắt đầu làm việc' to cursor)
        const magneticBtn = document.getElementById('magnetic-btn');
        if (magneticBtn) {
            document.addEventListener('mousemove', (e) => {
                const rect = magneticBtn.getBoundingClientRect();
                const btnX = rect.left + rect.width / 2;
                const btnY = rect.top + rect.height / 2;
                
                const dx = e.clientX - btnX;
                const dy = e.clientY - btnY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const activeRadius = 90; // Pull starts within 90px

                if (dist < activeRadius) {
                    // Pull intensity increases as cursor gets closer (max pull: 12px)
                    const pullFactor = (activeRadius - dist) / activeRadius;
                    const pullX = (dx / dist) * pullFactor * 12;
                    const pullY = (dy / dist) * pullFactor * 12;
                    
                    magneticBtn.style.transform = `translate(${pullX}px, ${pullY}px) scale(1.02)`;
                } else {
                    magneticBtn.style.transform = 'translate(0px, 0px) scale(1)';
                }
            });

            magneticBtn.addEventListener('mouseleave', () => {
                magneticBtn.style.transform = 'translate(0px, 0px) scale(1)';
            });
        }
    </script>
</body>
</html>
