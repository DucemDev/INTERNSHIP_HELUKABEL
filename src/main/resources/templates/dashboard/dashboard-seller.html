<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/main-layout :: layout(~{::main})}">
<body>
    <main class="space-y-8 p-4 md:p-8 bg-slate-50 min-h-screen">
        <div id="debug-error-log" class="text-red-600 font-bold bg-red-50 p-4 rounded-xl border border-red-100 hidden"></div>
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight" th:text="#{seller.dashboard_title}">Bảng điều khiển Nhân viên</h1>
                <p class="mt-1 text-sm font-medium text-slate-500" th:text="#{seller.dashboard_desc}">Theo dõi hiệu suất cá nhân và chỉ tiêu doanh số của riêng bạn.</p>
            </div>
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Total Leads -->
            <div class="kpi-card bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative overflow-hidden flex flex-col justify-between min-h-[140px]">
                <div class="accent-bar bg-gradient-to-r from-blue-500 to-indigo-600"></div>
                <div class="flex items-center gap-2.5 mb-3 mt-1">
                    <div class="bg-blue-50 text-blue-600 p-2.5 rounded-xl"><i data-lucide="users" class="w-5 h-5"></i></div>
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Leads của tôi</h3>
                </div>
                <div id="myTotalLeads" class="text-3xl font-black text-slate-800 animate-counter">0</div>
            </div>

            <!-- Won Leads -->
            <div class="kpi-card bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative overflow-hidden flex flex-col justify-between min-h-[140px]">
                <div class="accent-bar bg-gradient-to-r from-emerald-500 to-emerald-600"></div>
                <div class="flex items-center gap-2.5 mb-3 mt-1">
                    <div class="bg-emerald-50 text-emerald-600 p-2.5 rounded-xl"><i data-lucide="award" class="w-5 h-5"></i></div>
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Tổng Deal Thắng (Won)</h3>
                </div>
                <div id="myWonLeads" class="text-3xl font-black text-slate-800 animate-counter">0</div>
            </div>

            <!-- Conversion Rate -->
            <div class="kpi-card bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative overflow-hidden flex flex-col justify-between min-h-[140px]">
                <div class="accent-bar bg-gradient-to-r from-violet-500 to-violet-600"></div>
                <div class="flex items-center gap-2.5 mb-3 mt-1">
                    <div class="bg-purple-50 text-purple-600 p-2.5 rounded-xl"><i data-lucide="trending-up" class="w-5 h-5"></i></div>
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Tỷ lệ chuyển đổi</h3>
                </div>
                <div id="myConversionRate" class="text-3xl font-black text-slate-800 animate-counter">0%</div>
            </div>
        </div>

        <!-- Target Progress Chart -->
        <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm flex flex-col">
            <h2 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                <span class="w-1.5 h-5 bg-red-600 rounded-full"></span> 
                <span>Tiến độ Target doanh thu</span>
                <span class="text-xs font-normal text-slate-400 font-mono ml-2">(/api/dashboard/staff/pipeline-coverage)</span>
            </h2>
            <div class="relative h-[220px] w-full">
                <canvas id="staffPipelineChart"></canvas>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script>
            // Helper function for formatting currency
            const fmtCurrency = (val) => {
                return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(val);
            };

            async function loadSellerData() {
                try {
                    // 1. Load Stats
                    const statsRes = await fetch('/api/dashboard/staff/stats');
                    const stats = await statsRes.json();
                    
                    document.getElementById('myTotalLeads').innerText = (stats.totalLead || 0).toLocaleString();
                    document.getElementById('myWonLeads').innerText = (stats.wonLead || 0).toLocaleString();
                    document.getElementById('myConversionRate').innerText = (stats.conversionRate || 0).toFixed(1) + '%';

                    // 2. Load Pipeline Coverage (Target Progress)
                    const pipeRes = await fetch('/api/dashboard/staff/pipeline-coverage');
                    const data = await pipeRes.json();

                    if (data && data.length > 0) {
                        const item = data[0];
                        const ctx = document.getElementById('staffPipelineChart').getContext('2d');
                        
                        new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: ['Chỉ tiêu của tôi'],
                                datasets: [
                                    {
                                        label: 'Open Pipeline (Cơ hội đang nuôi dưỡng)',
                                        data: [item.openPipeline || 0],
                                        backgroundColor: 'rgba(59, 130, 246, 0.85)',
                                        borderColor: '#3b82f6',
                                        borderWidth: 1,
                                        borderRadius: 8
                                    },
                                    {
                                        label: 'Revenue Target (Doanh thu mục tiêu)',
                                        data: [item.targetRevenue || item.target || 0],
                                        backgroundColor: 'rgba(239, 68, 68, 0.85)',
                                        borderColor: '#ef4444',
                                        borderWidth: 1,
                                        borderRadius: 8
                                    }
                                ]
                            },
                            options: {
                                indexAxis: 'y',
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: { position: 'bottom', labels: { usePointStyle: true, font: { family: "'Inter', sans-serif" } } },
                                    tooltip: {
                                        callbacks: {
                                            label: ctx => ` ${ctx.dataset.label}: ${fmtCurrency(ctx.parsed.x)}`
                                        }
                                    }
                                },
                                scales: {
                                    x: {
                                        beginAtZero: true,
                                        grid: { color: '#f1f5f9' },
                                        ticks: { callback: v => v.toLocaleString() }
                                    },
                                    y: {
                                        grid: { display: false }
                                    }
                                }
                            }
                        });
                    } else {
                        document.getElementById('staffPipelineChart').parentNode.innerHTML = `
                            <div class="flex items-center justify-center h-full text-slate-400 font-semibold">Chưa thiết lập chỉ tiêu doanh số cho tài khoản này</div>
                        `;
                    }

                } catch (err) {
                    console.error('Error loading seller data:', err);
                    const log = document.getElementById('debug-error-log');
                    log.innerText = 'Không thể tải dữ liệu hiệu suất của Seller: ' + err.message;
                    log.classList.remove('hidden');
                }
            }

            document.addEventListener('DOMContentLoaded', loadSellerData);
        </script>
    </main>
</body>
</html>
