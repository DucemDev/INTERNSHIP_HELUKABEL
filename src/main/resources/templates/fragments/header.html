<header class="fixed top-0 right-0 z-[1000] flex h-20 w-full items-center justify-between border-b border-white/30 bg-white/45 backdrop-blur-xl px-10 transition-all duration-300 lg:w-[calc(100%-16rem)] shadow-[0_4px_20px_rgba(0,0,0,0.01)]" th:fragment="header">
    <div class="flex items-center flex-1">
        <!-- Filter Year and Quarter (Global) -->
        <div class="flex items-center gap-3 bg-white/30 backdrop-blur-md p-1.5 rounded-2xl border border-white/50 shadow-sm">
            <div class="flex items-center gap-1.5 text-slate-500 pl-2">
                <i data-lucide="calendar" class="w-4 h-4 text-slate-400"></i>
                <span class="text-xs font-bold uppercase tracking-wider text-slate-600">Bộ lọc:</span>
            </div>
            
            <!-- Select Year -->
            <select id="globalYearFilter" onchange="applyGlobalFilters()" class="bg-white/80 border border-slate-200 text-slate-700 text-xs font-bold rounded-xl px-3 py-1.5 focus:ring-2 focus:ring-red-500 focus:border-red-500 cursor-pointer outline-none transition-all shadow-sm">
                <option value="all">Tất cả năm</option>
                <option value="2026">Năm 2026</option>
                <option value="2025">Năm 2025</option>
                <option value="2024">Năm 2024</option>
                <option value="2023">Năm 2023</option>
            </select>

            <!-- Select Quarter -->
            <select id="globalQuarterFilter" onchange="applyGlobalFilters()" class="bg-white/80 border border-slate-200 text-slate-700 text-xs font-bold rounded-xl px-3 py-1.5 focus:ring-2 focus:ring-red-500 focus:border-red-500 cursor-pointer outline-none transition-all shadow-sm">
                <option value="all">Cả năm (Tất cả quý)</option>
                <option value="1">Quý 1 (Q1)</option>
                <option value="2">Quý 2 (Q2)</option>
                <option value="3">Quý 3 (Q3)</option>
                <option value="4">Quý 4 (Q4)</option>
            </select>
        </div>
    </div>

    <div class="flex items-center gap-6">
        <!-- Multi-language Toggle -->
        <div class="flex items-center gap-2 bg-white/30 backdrop-blur-md p-1 rounded-xl border border-white/50">
            <a th:href="@{''(lang='vi')}" 
               class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
               th:classappend="${#locale.language == 'vi'} ? 'bg-white/80 text-helu-red shadow-sm' : 'text-slate-500 hover:text-slate-700'">
                VN
            </a>
            <a th:href="@{''(lang='en')}" 
               class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
               th:classappend="${#locale.language == 'en'} ? 'bg-white/80 text-helu-red shadow-sm' : 'text-slate-500 hover:text-slate-700'">
                EN
            </a>
        </div>

        <!-- Notification Dropdown -->
        <div class="relative">
            <button class="relative flex h-10 w-10 items-center justify-center rounded-xl border border-helu-border bg-white text-gray-600 hover:text-helu-red hover:bg-red-50 transition-all" onclick="toggleNotificationDropdown()">
                <i data-lucide="bell" class="w-5 h-5"></i>
                <span id="notificationBadge" class="absolute -top-1.5 -right-1.5 hidden flex h-5 w-5 items-center justify-center rounded-full bg-helu-red text-[10px] font-bold text-white border-2 border-white shadow-sm">0</span>
            </button>

            <!-- Dropdown Menu -->
            <div id="notificationDropdown" class="absolute right-0 top-[calc(100%+10px)] hidden w-80 rounded-2xl border border-helu-border bg-white p-3 shadow-xl z-50">
                <div class="flex items-center justify-between border-b border-helu-border pb-2 mb-2">
                    <span class="text-sm font-bold text-gray-800">Thông báo</span>
                    <button class="text-xs font-semibold text-helu-red hover:underline" onclick="markAllNotificationsAsRead()">Đọc tất cả</button>
                </div>
                <div id="notificationList" class="max-h-60 overflow-y-auto space-y-1">
                    <div class="py-4 text-center text-xs text-gray-400">Không có thông báo mới</div>
                </div>
            </div>
        </div>

        <!-- User Profile -->
        <div class="relative">
            <button class="flex items-center gap-3 rounded-xl p-1.5 transition-all hover:bg-white/40 group" onclick="toggleUserDropdown()">
                <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-helu-red font-bold text-white shadow-md shadow-red-200">AD</div>
                <div class="hidden flex-col text-left md:flex">
                    <span class="text-sm font-bold text-gray-800" id="displayUserName">Admin</span>
                    <span class="text-[10px] font-medium text-gray-500 uppercase tracking-wider" id="displayUserRole">Quản trị viên</span>
                </div>
                <i data-lucide="chevron-down" class="ml-1 w-4 h-4 text-gray-400 group-hover:text-helu-red transition-all"></i>
            </button>
            
            <!-- Profile Dropdown -->
            <div id="userDropdown" class="absolute right-0 top-[calc(100%+10px)] hidden w-56 rounded-2xl border border-white/60 bg-white/80 backdrop-blur-xl p-2 shadow-xl animate-in fade-in slide-in-from-top-2">
                <a sec:authorize="hasRole('Admin')" href="/admin/settings" class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium text-gray-600 hover:bg-white/50 hover:text-helu-red transition-all">
                    <i data-lucide="settings" class="w-4 h-4"></i> Cấu hình Hệ thống
                </a>
                <div class="my-2 h-[1px] bg-white/30"></div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-sm font-bold text-helu-red hover:bg-red-50/50 transition-all text-left">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Đăng xuất
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Container for Real-time Popup Notifications -->
    <div id="toastContainer" class="fixed top-24 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        // Setup global filter script
        const urlParams = new URLSearchParams(window.location.search);
        const yearParam = urlParams.get('year');
        const quarterParam = urlParams.get('quarter');

        // Global function to apply filters
        function applyGlobalFilters() {
            const year = document.getElementById('globalYearFilter').value;
            const quarter = document.getElementById('globalQuarterFilter').value;
            
            const url = new URL(window.location.href);
            if (year === 'all') {
                url.searchParams.delete('year');
            } else {
                url.searchParams.set('year', year);
            }
            if (quarter === 'all') {
                url.searchParams.delete('quarter');
            } else {
                url.searchParams.set('quarter', quarter);
            }
            window.location.href = url.toString();
        }

        // Initialize selectors on load
        document.addEventListener('DOMContentLoaded', () => {
            const ySelect = document.getElementById('globalYearFilter');
            const qSelect = document.getElementById('globalQuarterFilter');
            if (ySelect) ySelect.value = yearParam || 'all';
            if (qSelect) qSelect.value = quarterParam || 'all';
        });

        // Intercept global fetch requests to append year and quarter parameters dynamically
        if (yearParam || quarterParam) {
            const originalFetch = window.fetch;
            window.fetch = function(input, init) {
                let url = typeof input === 'string' ? input : input.url;
                // Only intercept local API endpoints
                if (url.includes('/api/')) {
                    const separator = url.includes('?') ? '&' : '?';
                    let newUrl = url;
                    if (yearParam && !url.includes('year=')) {
                        newUrl += separator + 'year=' + yearParam;
                    }
                    if (quarterParam && !newUrl.includes('quarter=')) {
                        const sep2 = newUrl.includes('?') ? '&' : '?';
                        newUrl += sep2 + 'quarter=' + quarterParam;
                    }
                    if (typeof input === 'string') {
                        input = newUrl;
                    } else {
                        input = new Request(newUrl, input);
                    }
                }
                return originalFetch(input, init);
            };
        }

        async function loadUserProfile() {
            try {
                const response = await fetch('/api/users/me');
                if (response.ok) {
                    const user = await response.json();
                    
                    const nameEl = document.getElementById('displayUserName');
                    const roleEl = document.getElementById('displayUserRole');
                    if (nameEl) nameEl.innerText = user.fullName;
                    if (roleEl) {
                        const role = (user.roleName || '').toUpperCase();
                        if (role === 'ADMIN') {
                            roleEl.innerText = 'Quản trị viên';
                        } else if (role === 'SELLER') {
                            roleEl.innerText = 'Nhân viên';
                        } else {
                            roleEl.innerText = user.roleName;
                        }
                    }
                    
                    const avatarEl = document.querySelector('button[onclick="toggleUserDropdown()"] div.bg-helu-red');
                    if (avatarEl && user.fullName) {
                        const parts = user.fullName.split(' ');
                        let initials = '';
                        if (parts.length >= 2) {
                            initials = (parts[parts.length - 2][0] + parts[parts.length - 1][0]).toUpperCase();
                        } else if (parts.length === 1) {
                            initials = parts[0].substring(0, 2).toUpperCase();
                        }
                        if (initials) {
                            avatarEl.innerText = initials;
                        }
                    }
                }
            } catch (err) {
                console.error("Error loading user profile:", err);
            }
        }
        document.addEventListener('DOMContentLoaded', loadUserProfile);

        let knownNotifIds = new Set();
        let isFirstLoad = true;

        function toggleUserDropdown() {
            const dropdown = document.getElementById('userDropdown');
            dropdown.classList.toggle('hidden');
        }

        function toggleNotificationDropdown() {
            const dropdown = document.getElementById('notificationDropdown');
            dropdown.classList.toggle('hidden');
            if (!dropdown.classList.contains('hidden')) {
                loadNotifications();
            }
        }

        async function loadNotifications() {
            try {
                const response = await fetch('/api/notifications');
                if (response.ok) {
                    const list = await response.json();
                    renderNotifications(list);
                }
            } catch (err) {
                console.error("Error loading notifications:", err);
            }
        }

        function playNotificationSound() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const playChime = (time, freq) => {
                    const osc = context.createOscillator();
                    const gain = context.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, time);
                    
                    gain.gain.setValueAtTime(0.15, time);
                    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.5);
                    
                    osc.connect(gain);
                    gain.connect(context.destination);
                    
                    osc.start(time);
                    osc.stop(time + 0.5);
                };
                playChime(context.currentTime, 523.25); // C5
                playChime(context.currentTime + 0.12, 659.25); // E5
            } catch (e) {
                console.warn("Audio context failed or not allowed:", e);
            }
        }

        function showToast(title, message, type, link) {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = "flex w-80 items-start gap-3 rounded-2xl border border-helu-border bg-white p-4 shadow-xl pointer-events-auto transform translate-x-full transition-all duration-300 animate-in slide-in-from-right-10";

            let iconHtml = '<i data-lucide="bell" class="w-5 h-5 text-gray-500"></i>';
            let titleColorClass = "text-gray-800";
            if (type === 'LOW_PERFORMANCE') {
                iconHtml = '<i data-lucide="alert-triangle" class="w-5 h-5 text-amber-500"></i>';
                titleColorClass = "text-amber-700";
            } else if (type === 'LEAD_LOST') {
                iconHtml = '<i data-lucide="x-circle" class="w-5 h-5 text-rose-500"></i>';
                titleColorClass = "text-rose-700";
            } else if (type === 'LEAD_WON') {
                iconHtml = '<i data-lucide="trophy" class="w-5 h-5 text-emerald-500"></i>';
                titleColorClass = "text-emerald-700";
            } else if (type === 'NEW_LEAD' || type === 'LEAD_ASSIGNED') {
                iconHtml = '<i data-lucide="user-plus" class="w-5 h-5 text-blue-500"></i>';
                titleColorClass = "text-blue-700";
            }

            toast.innerHTML = `
                <div class="flex-shrink-0 mt-0.5">${iconHtml}</div>
                <div class="flex-1 min-w-0">
                    <span class="block text-xs font-black ${titleColorClass}">${title}</span>
                    <span class="block text-[11px] text-gray-500 mt-1 leading-normal">${message}</span>
                </div>
                <button class="flex-shrink-0 text-gray-400 hover:text-gray-600" onclick="this.parentElement.remove()"><i data-lucide="x" class="w-4 h-4"></i></button>
            `;

            if (link) {
                toast.classList.add('cursor-pointer');
                toast.addEventListener('click', (e) => {
                    if (!e.target.closest('button')) {
                        window.location.href = link;
                    }
                });
            }

            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.remove('translate-x-full');
            }, 50);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 6000);
        }

        async function updateUnreadCount() {
            try {
                const response = await fetch('/api/notifications');
                if (response.ok) {
                    const list = await response.json();
                    
                    // 1. Calculate unread count
                    const unreadList = list.filter(item => !item.isRead);
                    const count = unreadList.length;
                    
                    const badge = document.getElementById('notificationBadge');
                    if (count > 0) {
                        badge.textContent = count;
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }

                    // 2. Play sound / toast for new unread notifications
                    unreadList.forEach(item => {
                        if (!knownNotifIds.has(item.id)) {
                            knownNotifIds.add(item.id);
                            if (!isFirstLoad) {
                                showToast(item.title, item.message, item.type, item.link);
                                playNotificationSound();
                            }
                        }
                    });

                    // Add all to known set to prevent future toasts
                    list.forEach(item => {
                        knownNotifIds.add(item.id);
                    });

                    isFirstLoad = false;
                }
            } catch (err) {
                console.error("Error loading unread count:", err);
            }
        }

        function renderNotifications(notifications) {
            const container = document.getElementById('notificationList');
            container.innerHTML = '';
            
            if (notifications.length === 0) {
                container.innerHTML = `<div class="py-4 text-center text-xs text-gray-400">Không có thông báo mới</div>`;
                return;
            }

            notifications.forEach(item => {
                const isReadClass = item.isRead ? 'opacity-60 bg-white' : 'bg-red-50/40 font-semibold border-l-4 border-helu-red';
                const date = new Date(item.createdAt).toLocaleString('vi-VN', {hour: '2-digit', minute:'2-digit', day:'2-digit', month:'2-digit'});
                
                let iconHtml = '<i data-lucide="bell" class="w-4 h-4 text-gray-500"></i>';
                let iconBg = 'bg-gray-100';
                if (item.type === 'LOW_PERFORMANCE') {
                    iconHtml = '<i data-lucide="alert-triangle" class="w-4 h-4 text-amber-500"></i>';
                    iconBg = 'bg-amber-50';
                } else if (item.type === 'LEAD_LOST') {
                    iconHtml = '<i data-lucide="x-circle" class="w-4 h-4 text-rose-500"></i>';
                    iconBg = 'bg-rose-50';
                } else if (item.type === 'LEAD_WON') {
                    iconHtml = '<i data-lucide="trophy" class="w-4 h-4 text-emerald-500"></i>';
                    iconBg = 'bg-emerald-50';
                } else if (item.type === 'NEW_LEAD' || item.type === 'LEAD_ASSIGNED') {
                    iconHtml = '<i data-lucide="user-plus" class="w-4 h-4 text-blue-500"></i>';
                    iconBg = 'bg-blue-50';
                }

                const notifEl = document.createElement('div');
                notifEl.className = `p-3 rounded-xl hover:bg-gray-50 transition-all cursor-pointer text-xs ${isReadClass} mb-1 flex gap-3 items-start`;
                notifEl.innerHTML = `
                    <div class="flex-shrink-0 rounded-xl p-2 ${iconBg}">
                        ${iconHtml}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start gap-1">
                            <span class="text-gray-800 font-bold block">${item.title}</span>
                            ${!item.isRead ? '<span class="h-2 w-2 rounded-full bg-helu-red flex-shrink-0 mt-1"></span>' : ''}
                        </div>
                        <span class="text-gray-600 block mt-1 leading-relaxed">${item.message}</span>
                        <span class="text-[9px] text-gray-400 block mt-1">${date}</span>
                    </div>
                `;
                
                notifEl.addEventListener('click', async () => {
                    if (!item.isRead) {
                        await fetch(`/api/notifications/${item.id}/read`, { method: 'PUT' });
                    }
                    if (item.link) {
                        window.location.href = item.link;
                    } else {
                        loadNotifications();
                        updateUnreadCount();
                    }
                });
                
                container.appendChild(notifEl);
            });
            lucide.createIcons();
        }

        async function markAllNotificationsAsRead() {
            try {
                const response = await fetch('/api/notifications/read-all', { method: 'PUT' });
                if (response.ok) {
                    loadNotifications();
                    updateUnreadCount();
                }
            } catch (err) {
                console.error("Error marking all as read:", err);
            }
        }

        window.addEventListener('click', function(e) {
            // Close user dropdown
            const userDropdown = document.getElementById('userDropdown');
            if (userDropdown && !userDropdown.classList.contains('hidden')) {
                if (!e.target.closest('button[onclick="toggleUserDropdown()"]') && !userDropdown.contains(e.target)) {
                    userDropdown.classList.add('hidden');
                }
            }

            // Close notification dropdown
            const notifDropdown = document.getElementById('notificationDropdown');
            if (notifDropdown && !notifDropdown.classList.contains('hidden')) {
                if (!e.target.closest('button[onclick="toggleNotificationDropdown()"]') && !notifDropdown.contains(e.target)) {
                    notifDropdown.classList.add('hidden');
                }
            }
        });

        // Initialize update and polling
        document.addEventListener('DOMContentLoaded', () => {
            updateUnreadCount();
            setInterval(updateUnreadCount, 10000); // Poll every 10s for active toast feel
        });
    </script>
</header>
