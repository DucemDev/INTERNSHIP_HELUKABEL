<header class="fixed top-0 right-0 z-[1000] flex h-20 w-full items-center justify-between border-b border-helu-border bg-white px-10 transition-all duration-300 lg:w-[calc(100%-16rem)]" th:fragment="header">
    <div class="flex items-center flex-1">
        <div class="relative w-full max-w-lg group">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-helu-red transition-colors"></i>
            <input type="text" placeholder="Tìm kiếm lead, khách hàng, sản phẩm..." class="h-12 w-full rounded-2xl bg-gray-50 pl-12 pr-4 text-sm outline-none border border-transparent focus:border-helu-red focus:bg-white transition-all">
        </div>
    </div>

    <div class="flex items-center gap-6">
        <!-- Multi-language Toggle -->
        <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-xl border border-slate-200">
            <a th:href="@{''(lang='vi')}" 
               class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
               th:classappend="${#locale.language == 'vi'} ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'">
                VN
            </a>
            <a th:href="@{''(lang='en')}" 
               class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
               th:classappend="${#locale.language == 'en'} ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'">
                EN
            </a>
        </div>

        <!-- Notification Dropdown -->
        <div class="relative">
            <button class="relative flex h-10 w-10 items-center justify-center rounded-xl border border-helu-border bg-white text-gray-600 hover:text-helu-red hover:bg-red-50 transition-all" onclick="toggleNotificationDropdown()">
                <i data-lucide="bell" class="w-5 h-5"></i>
                <span id="notificationBadge" class="absolute -top-1.5 -right-1.5 hidden flex h-5 w-5 items-center justify-center rounded-full bg-helu-red text-[10px] font-bold text-white border-2 border-white shadow-sm">0</span>
            </button>

            <!-- Dropdown Menu -->
            <div id="notificationDropdown" class="absolute right-0 top-[calc(100%+10px)] hidden w-80 rounded-2xl border border-helu-border bg-white p-3 shadow-xl z-50">
                <div class="flex items-center justify-between border-b border-helu-border pb-2 mb-2">
                    <span class="text-sm font-bold text-gray-800">Thông báo</span>
                    <button class="text-xs font-semibold text-helu-red hover:underline" onclick="markAllNotificationsAsRead()">Đọc tất cả</button>
                </div>
                <div id="notificationList" class="max-h-60 overflow-y-auto space-y-1">
                    <div class="py-4 text-center text-xs text-gray-400">Không có thông báo mới</div>
                </div>
            </div>
        </div>

        <!-- User Profile -->
        <div class="relative">
            <button class="flex items-center gap-3 rounded-xl p-1.5 transition-all hover:bg-gray-50 group" onclick="toggleUserDropdown()">
                <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-helu-red font-bold text-white shadow-md shadow-red-200">AD</div>
                <div class="hidden flex-col text-left md:flex">
                    <span class="text-sm font-bold text-gray-800" id="displayUserName">Admin</span>
                    <span class="text-[10px] font-medium text-gray-500 uppercase tracking-wider" id="displayUserRole">Quản trị viên</span>
                </div>
                <i data-lucide="chevron-down" class="ml-1 w-4 h-4 text-gray-400 group-hover:text-helu-red transition-all"></i>
            </button>
            
            <!-- Profile Dropdown -->
            <div id="userDropdown" class="absolute right-0 top-[calc(100%+10px)] hidden w-56 rounded-2xl border border-helu-border bg-white p-2 shadow-xl animate-in fade-in slide-in-from-top-2">
                <a href="#" class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium text-gray-600 hover:bg-red-50 hover:text-helu-red transition-all">
                    <i data-lucide="user" class="w-4 h-4"></i> Hồ sơ cá nhân
                </a>
                <a href="#" class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium text-gray-600 hover:bg-red-50 hover:text-helu-red transition-all">
                    <i data-lucide="key" class="w-4 h-4"></i> Đổi mật khẩu
                </a>
                <div class="my-2 h-[1px] bg-helu-border"></div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-sm font-bold text-helu-red hover:bg-red-50 transition-all text-left">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Đăng xuất
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function toggleUserDropdown() {
            const dropdown = document.getElementById('userDropdown');
            dropdown.classList.toggle('hidden');
        }

        function toggleNotificationDropdown() {
            const dropdown = document.getElementById('notificationDropdown');
            dropdown.classList.toggle('hidden');
            if (!dropdown.classList.contains('hidden')) {
                loadNotifications();
            }
        }

        async function loadNotifications() {
            try {
                const response = await fetch('/api/notifications');
                if (response.ok) {
                    const list = await response.json();
                    renderNotifications(list);
                }
            } catch (err) {
                console.error("Error loading notifications:", err);
            }
        }

        async function updateUnreadCount() {
            try {
                const response = await fetch('/api/notifications/unread-count');
                if (response.ok) {
                    const count = await response.json();
                    const badge = document.getElementById('notificationBadge');
                    if (count > 0) {
                        badge.textContent = count;
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }
                }
            } catch (err) {
                console.error("Error loading unread count:", err);
            }
        }

        function renderNotifications(notifications) {
            const container = document.getElementById('notificationList');
            container.innerHTML = '';
            
            if (notifications.length === 0) {
                container.innerHTML = `<div class="py-4 text-center text-xs text-gray-400">Không có thông báo mới</div>`;
                return;
            }

            notifications.forEach(item => {
                const isReadClass = item.isRead ? 'opacity-60 bg-white' : 'bg-red-50/40 font-semibold border-l-4 border-helu-red';
                const date = new Date(item.createdAt).toLocaleString('vi-VN', {hour: '2-digit', minute:'2-digit', day:'2-digit', month:'2-digit'});
                
                const notifEl = document.createElement('div');
                notifEl.className = `p-3 rounded-xl hover:bg-gray-50 transition-all cursor-pointer text-xs ${isReadClass} mb-1`;
                notifEl.innerHTML = `
                    <div class="flex justify-between items-start gap-1">
                        <span class="text-gray-800 font-bold block">${item.title}</span>
                        ${!item.isRead ? '<span class="h-2 w-2 rounded-full bg-helu-red flex-shrink-0 mt-1"></span>' : ''}
                    </div>
                    <span class="text-gray-600 block mt-1">${item.message}</span>
                    <span class="text-[10px] text-gray-400 block mt-1">${date}</span>
                `;
                
                notifEl.addEventListener('click', async () => {
                    if (!item.isRead) {
                        await fetch(`/api/notifications/${item.id}/read`, { method: 'PUT' });
                    }
                    if (item.link) {
                        window.location.href = item.link;
                    } else {
                        loadNotifications();
                        updateUnreadCount();
                    }
                });
                
                container.appendChild(notifEl);
            });
        }

        async function markAllNotificationsAsRead() {
            try {
                const response = await fetch('/api/notifications/read-all', { method: 'PUT' });
                if (response.ok) {
                    loadNotifications();
                    updateUnreadCount();
                }
            } catch (err) {
                console.error("Error marking all as read:", err);
            }
        }

        window.addEventListener('click', function(e) {
            // Close user dropdown
            const userDropdown = document.getElementById('userDropdown');
            if (userDropdown && !userDropdown.classList.contains('hidden')) {
                if (!e.target.closest('button[onclick="toggleUserDropdown()"]') && !userDropdown.contains(e.target)) {
                    userDropdown.classList.add('hidden');
                }
            }

            // Close notification dropdown
            const notifDropdown = document.getElementById('notificationDropdown');
            if (notifDropdown && !notifDropdown.classList.contains('hidden')) {
                if (!e.target.closest('button[onclick="toggleNotificationDropdown()"]') && !notifDropdown.contains(e.target)) {
                    notifDropdown.classList.add('hidden');
                }
            }
        });

        // Initialize update and polling
        document.addEventListener('DOMContentLoaded', () => {
            updateUnreadCount();
            setInterval(updateUnreadCount, 30000); // Poll every 30s
        });
    </script>
</header>
