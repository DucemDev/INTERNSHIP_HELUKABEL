<aside class="fixed left-0 top-0 z-[1001] flex h-screen w-64 flex-col border-r border-helu-border bg-white transition-all duration-300 sidebar" th:fragment="sidebar">
    <div class="flex h-20 items-center justify-between px-6 border-bottom border-helu-border">
        <a th:href="@{/dashboard}" class="flex items-center">
            <img th:src="@{/images/logo.png}" alt="HELUKABEL" class="h-9 w-auto object-contain">
        </a>
        <button class="p-2 text-gray-400 hover:text-helu-red lg:hidden" onclick="toggleSidebar()">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </div>

    <div class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
        <!-- Dashboard -->
        <div class="rounded-xl transition-all duration-200">
            <div th:classappend="${activeMenu == 'dashboard' || activeMenu == 'underserved-segments' ? 'bg-helu-red text-white shadow-lg' : 'text-gray-500 hover:bg-red-50 hover:text-helu-red'}" class="rounded-xl">
                <div class="flex items-center justify-between px-4 py-3 cursor-pointer" onclick="toggleSubmenu(this.parentElement)">
                    <div class="flex items-center font-medium">
                        <i data-lucide="layout-dashboard" class="mr-3 w-5 h-5"></i>
                        <span th:text="#{nav.dashboard}">Dashboard</span>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 transition-transform duration-200 arrow-icon" th:classappend="${activeMenu == 'dashboard' || activeMenu == 'underserved-segments' ? 'rotate-90' : ''}"></i>
                </div>
            </div>
            
            <div class="mt-1 ml-4 space-y-1 overflow-hidden transition-all duration-300" 
                 th:classappend="${activeMenu == 'dashboard' || activeMenu == 'underserved-segments' ? '' : 'hidden'}">
                <a href="/dashboard" 
                   th:classappend="${activeMenu == 'dashboard' ? 'text-helu-red font-semibold' : 'text-gray-500 hover:text-helu-red'}"
                   class="flex items-center px-4 py-2 text-sm rounded-lg transition-colors">
                    <i data-lucide="pie-chart" class="mr-3 w-4 h-4"></i>
                    <span th:text="#{nav.dashboard.overview}">Tổng quan</span>
                </a>
                <a href="/dashboard/underserved-segments" 
                   th:classappend="${activeMenu == 'underserved-segments' ? 'text-helu-red font-semibold' : 'text-gray-500 hover:text-helu-red'}"
                   class="flex items-center px-4 py-2 text-sm rounded-lg transition-colors">
                    <i data-lucide="target" class="mr-3 w-4 h-4"></i>
                    <span th:text="#{nav.underserved_segments}">Spot under-served segments</span>
                </a>
            </div>
        </div>

        <!-- Quản lý Lead -->
        <div th:classappend="${activeMenu == 'leads' ? 'bg-helu-red text-white shadow-lg' : 'text-gray-500 hover:bg-red-50 hover:text-helu-red'}" class="rounded-xl transition-all duration-200">
            <a href="/leads" class="flex items-center px-4 py-3 font-medium">
                <i data-lucide="users" class="mr-3 w-5 h-5"></i>
                <span th:text="#{nav.leads}">Quản lý Lead</span>
            </a>
        </div>

        <!-- Nhân sự (Admin) -->
        <div th:classappend="${activeMenu == 'users' ? 'bg-helu-red text-white shadow-lg' : 'text-gray-500 hover:bg-red-50 hover:text-helu-red'}" class="rounded-xl transition-all duration-200">
            <a href="/users" class="flex items-center px-4 py-3 font-medium">
                <i data-lucide="user-cog" class="mr-3 w-5 h-5"></i>
                <span th:text="#{nav.users}">Nhân sự (Admin)</span>
            </a>
        </div>
    </div>



    <script>
        function toggleSubmenu(button) {
            const submenu = button.nextElementSibling;
            const arrow = button.querySelector('.arrow-icon');
            submenu.classList.toggle('hidden');
            arrow.classList.toggle('rotate-90');
        }
        
        function toggleSidebar() {
            // Simplified for refactor
        }
    </script>
</aside>
