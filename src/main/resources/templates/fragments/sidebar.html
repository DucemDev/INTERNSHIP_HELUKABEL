<aside class="fixed left-0 top-0 z-[1001] flex h-screen w-64 flex-col border-r border-helu-border bg-white transition-all duration-300 sidebar" th:fragment="sidebar">
    <div class="flex h-20 items-center justify-between px-6 border-bottom border-helu-border">
        <a href="/" class="flex items-center">
            <img th:src="@{/images/logo.png}" alt="HELUKABEL" class="h-9 w-auto object-contain">
        </a>
        <button class="p-2 text-gray-400 hover:text-helu-red lg:hidden" onclick="toggleSidebar()">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </div>

    <div class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
        <!-- Dashboard -->
        <div th:classappend="${activeMenu == 'dashboard' ? 'bg-helu-red text-white shadow-lg' : 'text-gray-500 hover:bg-red-50 hover:text-helu-red'}" class="rounded-xl transition-all duration-200">
            <a href="/admin" class="flex items-center px-4 py-3 font-medium">
                <i data-lucide="layout-dashboard" class="mr-3 w-5 h-5"></i>
                <span>Tổng quan</span>
            </a>
        </div>

        <!-- Quản lý Lead -->
        <div class="space-y-1">
            <button class="flex w-full items-center justify-between rounded-xl px-4 py-3 font-medium text-gray-500 transition-all duration-200 hover:bg-red-50 hover:text-helu-red" onclick="toggleSubmenu(this)">
                <div class="flex items-center">
                    <i data-lucide="users" class="mr-3 w-5 h-5"></i>
                    <span>Quản lý Lead</span>
                </div>
                <i data-lucide="chevron-right" class="w-4 h-4 transition-transform duration-300 arrow-icon"></i>
            </button>
            <ul class="hidden pl-12 space-y-1 submenu">
                <li><a href="/leads" class="block py-2 text-sm text-gray-500 hover:text-helu-red transition-colors">Danh sách Lead</a></li>
                <li><a href="#" class="block py-2 text-sm text-gray-500 hover:text-helu-red transition-colors">Phân công Lead</a></li>
            </ul>
        </div>

        <!-- Lead Source -->
        <div class="space-y-1">
            <button class="flex w-full items-center justify-between rounded-xl px-4 py-3 font-medium text-gray-500 transition-all duration-200 hover:bg-red-50 hover:text-helu-red" onclick="toggleSubmenu(this)">
                <div class="flex items-center">
                    <i data-lucide="database" class="mr-3 w-5 h-5"></i>
                    <span>Lead Source</span>
                </div>
                <i data-lucide="chevron-right" class="w-4 h-4 transition-transform duration-300 arrow-icon"></i>
            </button>
            <ul class="hidden pl-12 space-y-1 submenu">
                <li><a href="#" class="block py-2 text-sm text-gray-500 hover:text-helu-red transition-colors">Danh sách nguồn</a></li>
                <li><a href="#" class="block py-2 text-sm text-gray-500 hover:text-helu-red transition-colors">Thêm nguồn mới</a></li>
            </ul>
        </div>

        <!-- Sản phẩm -->
        <div class="space-y-1">
            <button class="flex w-full items-center justify-between rounded-xl px-4 py-3 font-medium text-gray-500 transition-all duration-200 hover:bg-red-50 hover:text-helu-red" onclick="toggleSubmenu(this)">
                <div class="flex items-center">
                    <i data-lucide="package" class="mr-3 w-5 h-5"></i>
                    <span>Sản phẩm</span>
                </div>
                <i data-lucide="chevron-right" class="w-4 h-4 transition-transform duration-300 arrow-icon"></i>
            </button>
            <ul class="hidden pl-12 space-y-1 submenu">
                <li><a href="#" class="block py-2 text-sm text-gray-500 hover:text-helu-red transition-colors">Danh sách sản phẩm</a></li>
                <li><a href="#" class="block py-2 text-sm text-gray-500 hover:text-helu-red transition-colors">Thêm sản phẩm</a></li>
            </ul>
        </div>

        <!-- Nhân sự (Admin) -->
        <div class="space-y-1" th:classappend="${activeMenu == 'users' ? 'open' : ''}">
            <button class="flex w-full items-center justify-between rounded-xl px-4 py-3 font-medium text-gray-500 transition-all duration-200 hover:bg-red-50 hover:text-helu-red" onclick="toggleSubmenu(this)">
                <div class="flex items-center">
                    <i data-lucide="user-cog" class="mr-3 w-5 h-5"></i>
                    <span>Nhân sự (Admin)</span>
                </div>
                <i data-lucide="chevron-right" class="w-4 h-4 transition-transform duration-300 arrow-icon" th:classappend="${activeMenu == 'users' ? 'rotate-90' : ''}"></i>
            </button>
            <ul class="pl-12 space-y-1 submenu" th:classappend="${activeMenu == 'users' ? 'block' : 'hidden'}">
                <li><a href="/users" class="block py-2 text-sm text-gray-500 hover:text-helu-red transition-colors">Danh sách nhân viên</a></li>
                <li><a href="#" class="block py-2 text-sm text-gray-500 hover:text-helu-red transition-colors">Phân quyền</a></li>
            </ul>
        </div>

        <!-- Chatbot AI -->
        <div class="space-y-1">
            <button class="flex w-full items-center justify-between rounded-xl px-4 py-3 font-medium text-gray-500 transition-all duration-200 hover:bg-red-50 hover:text-helu-red" onclick="toggleSubmenu(this)">
                <div class="flex items-center">
                    <i data-lucide="bot" class="mr-3 w-5 h-5"></i>
                    <span>Chatbot AI</span>
                </div>
                <i data-lucide="chevron-right" class="w-4 h-4 transition-transform duration-300 arrow-icon"></i>
            </button>
            <ul class="hidden pl-12 space-y-1 submenu">
                <li><a href="#" class="block py-2 text-sm text-gray-500 hover:text-helu-red transition-colors">Tổng quan Chatbot</a></li>
                <li><a href="#" class="block py-2 text-sm text-gray-500 hover:text-helu-red transition-colors">Training Chatbot</a></li>
            </ul>
        </div>

        <!-- Báo cáo -->
        <div class="text-gray-500 hover:bg-red-50 hover:text-helu-red rounded-xl transition-all duration-200">
            <a href="#" class="flex items-center px-4 py-3 font-medium">
                <i data-lucide="bar-chart-3" class="mr-3 w-5 h-5"></i>
                <span>Báo cáo</span>
            </a>
        </div>
    </div>

    <div class="p-6">
        <div class="rounded-2xl bg-gray-50 p-5 text-center">
            <h4 class="text-sm font-bold text-gray-800">Cần hỗ trợ?</h4>
            <p class="mt-1 text-xs text-gray-500 leading-relaxed">Liên hệ đội ngũ HELUKABEL CRM</p>
            <a href="mailto:support@helukabel.vn" class="mt-4 block rounded-xl bg-white border border-gray-200 py-2.5 text-xs font-bold text-gray-700 hover:bg-helu-red hover:text-white hover:border-helu-red transition-all duration-200">Liên hệ ngay</a>
        </div>
    </div>

    <script>
        function toggleSubmenu(button) {
            const submenu = button.nextElementSibling;
            const arrow = button.querySelector('.arrow-icon');
            submenu.classList.toggle('hidden');
            arrow.classList.toggle('rotate-90');
        }
        
        function toggleSidebar() {
            // Simplified for refactor
        }
    </script>
</aside>
