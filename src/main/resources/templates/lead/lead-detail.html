<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/main-layout :: layout(~{::main})}">
<body>
    <main class="space-y-8">
        <!-- Header -->
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/leads" class="group flex h-10 w-10 items-center justify-center rounded-xl border border-gray-200 bg-white hover:bg-gray-50 transition-all">
                    <i data-lucide="arrow-left" class="w-5 h-5 text-gray-400 group-hover:text-helu-red transition-colors"></i>
                </a>
                <div>
                    <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight" id="detailLeadId" th:text="#{status.loading}">Đang tải...</h1>
                    <p class="text-sm font-medium text-gray-500" th:text="#{detail.leads.desc}">Chi tiết thông tin khách hàng tiềm năng</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="deleteLead()" class="inline-flex items-center gap-2 rounded-xl border border-rose-200 bg-rose-50 px-6 py-3 text-sm font-bold text-rose-600 hover:bg-rose-100 transition-all shadow-sm">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> <span>Xóa lead</span>
                </button>
                <button onclick="openModal('edit')" class="inline-flex items-center gap-2 rounded-xl bg-helu-red px-6 py-3 text-sm font-bold text-white shadow-lg shadow-red-200 hover:bg-red-700 transition-all">
                    <i data-lucide="edit-3" class="w-4 h-4"></i> <span th:text="#{detail.btn.edit}">Chỉnh sửa thông tin</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Main Info Card -->
            <div class="lg:col-span-2 space-y-8">
                <div class="rounded-2xl border border-helu-border bg-white shadow-sm overflow-hidden">
                    <div class="border-b border-gray-100 bg-gray-50/50 px-8 py-4">
                        <h3 class="text-sm font-bold uppercase tracking-wider text-gray-400" th:text="#{detail.section.customer}">Thông tin khách hàng</h3>
                    </div>
                    <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold uppercase text-gray-400" th:text="#{form.fullname}">Họ và tên</label>
                            <p class="text-base font-bold text-gray-900" id="detailFullName">-</p>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold uppercase text-gray-400" th:text="#{form.company}">Công ty / Tài khoản</label>
                            <p class="text-base font-bold text-gray-900" id="detailAccount">-</p>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold uppercase text-gray-400" th:text="#{form.phone}">Số điện thoại</label>
                            <p class="text-base font-medium text-gray-600" id="detailPhone">-</p>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold uppercase text-gray-400" th:text="#{form.email}">Email</label>
                            <p class="text-base font-medium text-gray-600" id="detailEmail">-</p>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold uppercase text-gray-400" th:text="#{label.role}">Vai trò</label>
                            <p class="text-base font-medium text-gray-600" id="detailRole">-</p>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold uppercase text-gray-400" th:text="#{dashboard.col.region}">Địa điểm</label>
                            <p class="text-base font-medium text-gray-600" id="detailLocation">-</p>
                        </div>
                    </div>
                </div>

                <div class="rounded-2xl border border-helu-border bg-white shadow-sm overflow-hidden">
                    <div class="border-b border-gray-100 bg-gray-50/50 px-8 py-4">
                        <h3 class="text-sm font-bold uppercase tracking-wider text-gray-400" th:text="#{detail.section.market}">Phân loại & Thị trường</h3>
                    </div>
                    <div class="p-8 grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold uppercase text-gray-400" th:text="#{form.group}">Nhóm khách hàng</label>
                            <div class="mt-1">
                                <span class="inline-flex items-center px-3 py-1 rounded-lg bg-blue-50 text-blue-700 text-xs font-bold" id="detailCustomerGroup">-</span>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold uppercase text-gray-400" th:text="#{form.industry}">Ngành nghề</label>
                            <div class="mt-1">
                                <span class="inline-flex items-center px-3 py-1 rounded-lg bg-purple-50 text-purple-700 text-xs font-bold" id="detailIndustryType">-</span>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold uppercase text-gray-400" th:text="#{form.region}">Khu vực</label>
                            <div class="mt-1">
                                <span class="inline-flex items-center px-3 py-1 rounded-lg bg-emerald-50 text-emerald-700 text-xs font-bold" id="detailRegion">-</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="rounded-2xl border border-helu-border bg-white shadow-sm overflow-hidden">
                    <div class="border-b border-gray-100 bg-gray-50/50 px-8 py-4">
                        <h3 class="text-sm font-bold uppercase tracking-wider text-gray-400" th:text="#{detail.section.business}">Sản phẩm & Kinh doanh</h3>
                    </div>
                    <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-12">
                        <div class="space-y-6">
                            <div class="space-y-1">
                                <label class="text-[11px] font-bold uppercase text-gray-400" th:text="#{form.product}">Sản phẩm quan tâm</label>
                                <p class="text-base font-bold text-gray-800" id="detailProduct">-</p>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[11px] font-bold uppercase text-gray-400" th:text="#{form.source}">Nguồn Lead</label>
                                <p class="text-base font-medium text-gray-600" id="detailSource">-</p>
                            </div>
                        </div>
                        <div class="space-y-6">
                            <div class="space-y-1">
                                <label class="text-[11px] font-bold uppercase text-gray-400" th:text="#{form.cost}">Chi phí dự kiến</label>
                                <p class="text-xl font-extrabold text-helu-red" id="detailCost">0 VNĐ</p>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[11px] font-bold uppercase text-gray-400" th:text="#{form.result}">Kết quả kinh doanh</label>
                                <p class="text-base font-bold text-gray-800" id="detailBusinessResult">0 VNĐ</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar Info -->
            <div class="space-y-8">
                <div class="rounded-2xl border border-helu-border bg-white p-8 shadow-sm">
                    <h3 class="text-sm font-bold uppercase tracking-wider text-gray-400 mb-6" th:text="#{detail.current_status}">Trạng thái hiện tại</h3>
                    <div id="detailStatusBadge" class="w-full py-4 rounded-xl text-center text-sm font-bold uppercase tracking-widest mb-6">
                        -
                    </div>
                    <div class="space-y-4 pt-6 border-t border-gray-100">
                        <div class="flex items-center justify-between text-sm">
                            <span class="font-medium text-gray-500" th:text="#{label.created_date}">Ngày tạo:</span>
                            <span class="font-bold text-gray-900" id="detailCreatedDate">-</span>
                        </div>
                        <div class="flex items-center justify-between text-sm">
                            <span class="font-medium text-gray-500" th:text="#{label.assigned_to}">Người phụ trách:</span>
                            <div class="flex items-center gap-2">
                                <div id="detailUserAvatar" class="flex h-6 w-6 items-center justify-center rounded bg-helu-red font-bold text-white text-[10px]">?</div>
                                <span class="font-bold text-gray-900" id="detailUserName">-</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="rounded-2xl border border-helu-border bg-white p-8 shadow-sm" id="lossReasonSection" style="display: none;">
                    <h3 class="text-sm font-bold uppercase tracking-wider text-rose-500 mb-4" th:text="#{detail.loss_reason}">Lý do thất bại</h3>
                    <p class="text-sm font-medium text-gray-600 italic" id="detailLossReason">-</p>
                </div>
            </div>
        </div>

        <!-- Reusing the Lead Modal from management page -->
        <div id="leadModal" class="fixed inset-0 z-[2000] hidden items-center justify-center bg-black/40 backdrop-blur-sm p-4">
            <div class="w-full max-w-2xl rounded-3xl bg-white p-8 shadow-2xl animate-in fade-in zoom-in duration-200 overflow-y-auto max-h-[90vh]">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight" id="modalTitle" th:text="#{detail.btn.edit}">Cập nhật thông tin Lead</h2>
                    <button onclick="closeModal()" class="rounded-xl p-2 text-gray-400 hover:bg-gray-50 hover:text-helu-red transition-all">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                <form id="leadForm" class="space-y-6">
                    <input type="hidden" id="leadId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700"><span th:text="#{form.fullname}">Họ và tên</span> <span class="text-helu-red">*</span></label>
                            <input type="text" id="fullName" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" required th:placeholder="#{form.placeholder.name}">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700"><span th:text="#{form.lead_id}">Mã Lead</span> <span class="text-helu-red">*</span></label>
                            <input type="text" id="leadIdInput" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" required readonly>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700" th:text="#{form.phone}">Số điện thoại</label>
                            <input type="text" id="phoneNumber" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" placeholder="0xxx.xxx.xxx">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700" th:text="#{form.email}">Email</label>
                            <input type="email" id="email" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" th:placeholder="#{form.placeholder.email}">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700"><span th:text="#{form.role}">Vai trò KH</span> <span class="text-helu-red">*</span></label>
                            <select id="customerRole" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer" required>
                                <option value="Manufacturer">Manufacturer</option>
                                <option value="Contractor">Contractor</option>
                                <option value="Trading">Trading</option>
                                <option value="Distributor">Distributor</option>
                                <option value="System Integrator">System Integrator</option>
                                <option value="End User">End User</option>
                                <option value="Consultant">Consultant</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700"><span th:text="#{dashboard.col.region}">Địa điểm</span> <span class="text-helu-red">*</span></label>
                            <input type="text" id="location" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" required placeholder="Hồ Chí Minh">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700"><span th:text="#{form.cost}">Chi phí dự kiến</span> <span class="text-helu-red">*</span></label>
                            <input type="number" id="cost" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" required value="0">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700"><span th:text="#{form.company}">Công ty / Tổ chức</span> <span class="text-helu-red">*</span></label>
                            <input type="text" id="account" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700"><span th:text="#{form.status}">Trạng thái</span> <span class="text-helu-red">*</span></label>
                            <select id="status" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer">
                                <option value="New">New</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Won">Won</option>
                                <option value="Lost">Lost</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700"><span th:text="#{label.assigned_to}">Người phụ trách</span> <span class="text-helu-red">*</span></label>
                            <select id="userId" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer" required>
                                <option value="" disabled selected>-- Chọn người phụ trách --</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700" th:text="#{form.group}">Nhóm KH</label>
                            <select id="customerGroup" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer">
                                <option value="">-- Chọn nhóm KH --</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700" th:text="#{form.industry}">Ngành</label>
                            <select id="industryType" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer">
                                <option value="">-- Chọn ngành --</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700" th:text="#{form.region}">Khu vực</label>
                            <select id="region" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer">
                                <option value="">-- Chọn khu vực --</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700"><span th:text="#{form.source}">Nguồn khách hàng</span> <span class="text-helu-red">*</span></label>
                            <select id="sourceName" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer" required>
                                <option value="" disabled selected>-- Chọn nguồn KH --</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700" th:text="#{form.product}">Sản phẩm quan tâm</label>
                            <select id="productName" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer">
                                <option value="">-- Chọn sản phẩm --</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex items-center justify-end gap-3 pt-6 border-t border-gray-100">
                        <button type="button" class="rounded-xl px-6 py-2.5 text-sm font-bold text-gray-500 hover:bg-gray-50 transition-all" onclick="closeModal()" th:text="#{form.btn.cancel}">Hủy bỏ</button>
                        <button type="submit" class="rounded-xl bg-helu-red px-6 py-2.5 text-sm font-bold text-white shadow-lg shadow-red-200 hover:bg-red-700 transition-all" th:text="#{form.btn.update}">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>

        <script th:inline="javascript">
            const leadId = [[${leadId}]];
            const apiBase = '/api/leads';
            let currentLead = null;
            const unassignedText = /*[[#{status.unassigned}]]*/ 'Chưa gán';

            async function fetchLeadDetail() {
                try {
                    const response = await fetch(`${apiBase}/${leadId}`);
                    currentLead = await response.json();
                    renderLeadDetail(currentLead);
                } catch (error) { console.error('Error fetching lead detail:', error); }
            }

            function renderLeadDetail(lead) {
                document.getElementById('detailLeadId').innerText = lead.leadId;
                document.getElementById('detailFullName').innerText = lead.fullName;
                document.getElementById('detailAccount').innerText = lead.account;
                document.getElementById('detailPhone').innerText = lead.phoneNumber || '-';
                document.getElementById('detailEmail').innerText = lead.email || '-';
                document.getElementById('detailRole').innerText = lead.customerRole || '-';
                document.getElementById('detailLocation').innerText = lead.location || '-';
                document.getElementById('detailCustomerGroup').innerText = lead.customerGroup || '-';
                document.getElementById('detailIndustryType').innerText = lead.industryType || '-';
                document.getElementById('detailRegion').innerText = lead.region || '-';
                document.getElementById('detailProduct').innerText = lead.productName || '-';
                document.getElementById('detailSource').innerText = lead.sourceName || '-';
                
                const locale = /*[[${#locale.language}]]*/ 'vi';
                const currency = locale === 'vi' ? 'VND' : 'USD';
                document.getElementById('detailCost').innerText = new Intl.NumberFormat(locale === 'vi' ? 'vi-VN' : 'en-US', { style: 'currency', currency: currency }).format(lead.cost || 0);
                document.getElementById('detailBusinessResult').innerText = new Intl.NumberFormat(locale === 'vi' ? 'vi-VN' : 'en-US', { style: 'currency', currency: currency }).format(lead.businessResult || 0);
                
                document.getElementById('detailCreatedDate').innerText = lead.createdDate;
                document.getElementById('detailUserName').innerText = lead.userName || unassignedText;
                document.getElementById('detailUserAvatar').innerText = lead.userName ? lead.userName.charAt(0) : '?';

                const statusBadge = document.getElementById('detailStatusBadge');
                statusBadge.innerText = lead.status;
                statusBadge.className = 'w-full py-4 rounded-xl text-center text-sm font-bold uppercase tracking-widest mb-6 ';
                if (lead.status === 'Won') statusBadge.classList.add('bg-emerald-50', 'text-emerald-600');
                else if (lead.status === 'Lost') statusBadge.classList.add('bg-rose-50', 'text-rose-600');
                else if (lead.status === 'In Progress') statusBadge.classList.add('bg-amber-50', 'text-amber-600');
                else statusBadge.classList.add('bg-blue-50', 'text-blue-600');

                const lossSection = document.getElementById('lossReasonSection');
                if (lead.status === 'Lost' && lead.lossReason) {
                    lossSection.style.display = 'block';
                    document.getElementById('detailLossReason').innerText = lead.lossReason;
                } else {
                    lossSection.style.display = 'none';
                }
                
                lucide.createIcons();
            }

            let metadata = null;

            async function fetchMetadata() {
                try {
                    const response = await fetch('/api/leads/metadata');
                    metadata = await response.json();
                    populateDropdowns();
                } catch (error) {
                    console.error('Error fetching metadata:', error);
                }
            }

            function populateDropdowns() {
                if (!metadata) return;

                // Populate Customer Groups
                const groupSelect = document.getElementById('customerGroup');
                groupSelect.innerHTML = '<option value="">-- Chọn nhóm KH --</option>';
                metadata.customerGroups.forEach(g => {
                    groupSelect.innerHTML += `<option value="${g}">${g}</option>`;
                });

                // Populate Industries
                const indSelect = document.getElementById('industryType');
                indSelect.innerHTML = '<option value="">-- Chọn ngành --</option>';
                metadata.industries.forEach(i => {
                    indSelect.innerHTML += `<option value="${i}">${i}</option>`;
                });

                // Populate Regions
                const regSelect = document.getElementById('region');
                regSelect.innerHTML = '<option value="">-- Chọn khu vực --</option>';
                metadata.regions.forEach(r => {
                    regSelect.innerHTML += `<option value="${r}">${r}</option>`;
                });

                // Populate Sources
                const srcSelect = document.getElementById('sourceName');
                srcSelect.innerHTML = '<option value="" disabled selected>-- Chọn nguồn KH --</option>';
                metadata.sources.forEach(s => {
                    srcSelect.innerHTML += `<option value="${s}">${s}</option>`;
                });

                // Populate Products
                const prodSelect = document.getElementById('productName');
                prodSelect.innerHTML = '<option value="">-- Chọn sản phẩm --</option>';
                metadata.products.forEach(p => {
                    prodSelect.innerHTML += `<option value="${p}">${p}</option>`;
                });

                // Populate Users
                const userSelect = document.getElementById('userId');
                userSelect.innerHTML = '<option value="" disabled selected>-- Chọn người phụ trách --</option>';
                metadata.users.forEach(u => {
                    userSelect.innerHTML += `<option value="${u.userId}">${u.fullName}</option>`;
                });
            }

            async function openModal(mode) {
                const modal = document.getElementById('leadModal');
                const form = document.getElementById('leadForm');
                
                // Ensure dropdowns are populated
                populateDropdowns();

                if (currentLead) {
                    document.getElementById('leadId').value = currentLead.leadId;
                    document.getElementById('leadIdInput').value = currentLead.leadId;
                    document.getElementById('fullName').value = currentLead.fullName;
                    document.getElementById('phoneNumber').value = currentLead.phoneNumber || '';
                    document.getElementById('email').value = currentLead.email || '';
                    document.getElementById('customerRole').value = currentLead.customerRole || 'Manufacturer';
                    document.getElementById('location').value = currentLead.location || '';
                    document.getElementById('cost').value = currentLead.cost || 0;
                    document.getElementById('account').value = currentLead.account;
                    document.getElementById('status').value = currentLead.status;
                    document.getElementById('customerGroup').value = currentLead.customerGroup || '';
                    document.getElementById('industryType').value = currentLead.industryType || '';
                    document.getElementById('region').value = currentLead.region || '';
                    document.getElementById('sourceName').value = currentLead.sourceName || '';
                    document.getElementById('productName').value = currentLead.productName || '';
                    
                    if (metadata && metadata.users) {
                        const foundUser = metadata.users.find(u => u.fullName === currentLead.userName);
                        document.getElementById('userId').value = foundUser ? foundUser.userId : '';
                    }
                }

                modal.classList.remove('hidden');
                modal.classList.add('flex');
            }

            function closeModal() { 
                const modal = document.getElementById('leadModal');
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }

            document.getElementById('leadForm').onsubmit = async (e) => {
                e.preventDefault();
                const leadId = document.getElementById('leadId').value;
                const url = `${apiBase}/${leadId}`;

                const data = {
                    leadId: document.getElementById('leadIdInput').value,
                    fullName: document.getElementById('fullName').value,
                    phoneNumber: document.getElementById('phoneNumber').value,
                    email: document.getElementById('email').value,
                    account: document.getElementById('account').value,
                    status: document.getElementById('status').value,
                    customerRole: document.getElementById('customerRole').value,
                    location: document.getElementById('location').value,
                    cost: parseFloat(document.getElementById('cost').value) || 0,
                    customerGroup: document.getElementById('customerGroup').value,
                    industryType: document.getElementById('industryType').value,
                    region: document.getElementById('region').value,
                    productName: document.getElementById('productName').value,
                    sourceName: document.getElementById('sourceName').value,
                    // Keep original values for other fields
                    createdDate: currentLead.createdDate,
                    userId: document.getElementById('userId').value || null,
                    businessResult: currentLead.businessResult,
                    lossReason: currentLead.lossReason
                };

                try {
                    const response = await fetch(url, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    if (response.ok) { 
                        closeModal(); 
                        fetchLeadDetail(); // Refresh data
                    } else {
                        const errText = await response.text();
                        alert("Lỗi cập nhật Lead: " + errText);
                    }
                } catch (error) { 
                    console.error('Error updating lead:', error); 
                    alert("Lỗi kết nối: " + error.message);
                }
            };

            async function deleteLead() {
                if (confirm('Bạn có muốn xóa lead này?')) {
                    try {
                        const response = await fetch(`${apiBase}/${leadId}`, { method: 'DELETE' });
                        if (response.ok) {
                            window.location.href = '/leads';
                        }
                    } catch (error) { console.error('Error deleting lead:', error); }
                }
            }

            document.addEventListener('DOMContentLoaded', async () => {
                await fetchMetadata();
                fetchLeadDetail();
            });
        </script>
    </main>
</body>
</html>
