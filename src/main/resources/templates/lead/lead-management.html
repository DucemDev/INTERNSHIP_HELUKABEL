<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/main-layout :: layout(~{::main})}">
<body>
<main class="space-y-8">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight" th:text="#{manage.leads.title}">Quản lý Lead</h1>
            <p class="mt-1 text-sm font-medium text-gray-500" th:text="#{manage.leads.desc}">Theo dõi và quản lý hành trình khách hàng tiềm năng của HELUKABEL.</p>
        </div>
        <div class="flex items-center gap-3">
            <button class="inline-flex items-center gap-2 rounded-xl bg-helu-red px-5 py-2.5 text-sm font-bold text-white shadow-lg shadow-red-200 hover:bg-red-700 transition-all" onclick="openModal('add')">
                <i data-lucide="plus" class="w-4 h-4"></i> <span th:text="#{manage.btn.add}">Thêm lead</span>
            </button>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="rounded-2xl border border-helu-border bg-white p-6 shadow-sm">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 items-end">
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-wider text-gray-400" th:text="#{manage.search.placeholder}">Tìm kiếm khách hàng</label>
                <div class="relative group">
                    <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 group-focus-within:text-helu-red transition-colors"></i>
                    <input type="text" id="searchInput" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 pl-10 pr-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" th:placeholder="#{manage.search.placeholder}" onkeyup="filterLeads()">
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-wider text-gray-400" th:text="#{label.status}">Trạng thái</label>
                <select id="statusFilter" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer" onchange="filterLeads()">
                    <option value="" th:text="#{manage.filter.all}">Tất cả trạng thái</option>
                    <option value="New">New</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Won">Won</option>
                    <option value="Lost">Lost</option>
                </select>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-wider text-gray-400" th:text="#{manage.sort.label}">Sắp xếp</label>
                <select id="sortFilter" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer" onchange="filterLeads()">
                    <option value="newest" th:text="#{manage.sort.newest}">Mới nhất</option>
                    <option value="oldest" th:text="#{manage.sort.oldest}">Cũ nhất</option>
                </select>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-wider text-gray-400" th:text="#{manage.time.label}">Thời gian</label>
                <input type="date" id="dateFilter" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer" onchange="filterLeads()">
            </div>
        </div>
    </div>

    <div class="rounded-2xl border border-helu-border bg-white shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left" id="leadsTable">
                <thead>
                <tr class="border-b border-gray-100 bg-gray-50/50">
                    <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-gray-400" th:text="#{label.id}">Mã Lead</th>
                    <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-gray-400" th:text="#{dashboard.col.name}">Khách hàng</th>
                    <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-gray-400" th:text="#{dashboard.col.group}">Nhóm KH</th>
                    <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-gray-400" th:text="#{dashboard.col.industry}">Ngành</th>
                    <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-gray-400" th:text="#{dashboard.col.region}">Khu vực</th>
                    <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-gray-400" th:text="#{label.status}">Trạng thái</th>
                    <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-gray-400" th:text="#{label.assigned_to}">Phụ trách</th>
                    <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-gray-400" th:text="#{manage.source_product}">Nguồn / Sản phẩm</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="flex items-center justify-between border-t border-gray-100 bg-white px-6 py-4">
            <div class="text-sm font-medium text-gray-500" id="recordCount">
                Hiển thị 0/0 bản ghi
            </div>
            <div class="flex items-center gap-2" id="paginationControls">
                <!-- Pagination buttons generated via JS -->
            </div>
        </div>
    </div>

    <!-- Lead Modal -->
    <div id="leadModal" class="fixed inset-0 z-[2000] hidden items-center justify-center bg-black/40 backdrop-blur-sm p-4">
        <div class="w-full max-w-2xl rounded-3xl bg-white p-8 shadow-2xl animate-in fade-in zoom-in duration-200 overflow-y-auto max-h-[90vh]">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight" id="modalTitle" th:text="#{manage.btn.add}">Thêm lead mới</h2>
                <button onclick="closeModal()" class="rounded-xl p-2 text-gray-400 hover:bg-gray-50 hover:text-helu-red transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="leadForm" class="space-y-6">
                <input type="hidden" id="leadId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700"><span th:text="#{form.fullname}">Họ và tên</span> <span class="text-helu-red">*</span></label>
                        <input type="text" id="fullName" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" required th:placeholder="#{form.placeholder.name}">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700"><span th:text="#{form.lead_id}">Mã Lead</span> <span class="text-helu-red">*</span></label>
                        <input type="text" id="leadIdInput" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" required placeholder="L-2026-xxxx">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700" th:text="#{form.phone}">Số điện thoại</label>
                        <input type="text" id="phoneNumber" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" placeholder="0xxx.xxx.xxx">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700" th:text="#{form.email}">Email</label>
                        <input type="email" id="email" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" th:placeholder="#{form.placeholder.email}">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700"><span th:text="#{form.role}">Vai trò KH</span> <span class="text-helu-red">*</span></label>
                        <select id="customerRole" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer" required>
                            <option value="Manufacturer">Manufacturer</option>
                            <option value="Contractor">Contractor</option>
                            <option value="Trading">Trading</option>
                            <option value="Distributor">Distributor</option>
                            <option value="System Integrator">System Integrator</option>
                            <option value="End User">End User</option>
                            <option value="Consultant">Consultant</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700"><span th:text="#{dashboard.col.region}">Địa điểm</span> <span class="text-helu-red">*</span></label>
                        <input type="text" id="location" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" required placeholder="Hồ Chí Minh">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700"><span th:text="#{form.cost}">Chi phí dự kiến</span> <span class="text-helu-red">*</span></label>
                        <input type="number" id="cost" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" required value="0">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700"><span th:text="#{form.company}">Công ty / Tổ chức</span> <span class="text-helu-red">*</span></label>
                        <input type="text" id="account" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700"><span th:text="#{form.status}">Trạng thái</span> <span class="text-helu-red">*</span></label>
                        <select id="status" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer">
                            <option value="New">New</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Won">Won</option>
                            <option value="Lost">Lost</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700"><span th:text="#{label.assigned_to}">Người phụ trách</span> <span class="text-helu-red">*</span></label>
                        <select id="userId" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer" required>
                            <option value="" disabled selected>-- Chọn người phụ trách --</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700" th:text="#{form.group}">Nhóm KH</label>
                        <select id="customerGroup" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer">
                            <option value="">-- Chọn nhóm KH --</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700" th:text="#{form.industry}">Ngành</label>
                        <select id="industryType" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer">
                            <option value="">-- Chọn ngành --</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700" th:text="#{form.region}">Khu vực</label>
                        <select id="region" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer">
                            <option value="">-- Chọn khu vực --</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700"><span th:text="#{form.source}">Nguồn khách hàng</span> <span class="text-helu-red">*</span></label>
                        <select id="sourceName" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer" required>
                            <option value="" disabled selected>-- Chọn nguồn KH --</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700" th:text="#{form.product}">Sản phẩm quan tâm</label>
                        <select id="productName" class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm font-medium outline-none focus:border-helu-red focus:bg-white transition-all appearance-none cursor-pointer">
                            <option value="">-- Chọn sản phẩm --</option>
                        </select>
                    </div>
                </div>
                <div class="flex items-center justify-end gap-3 pt-6 border-t border-gray-100">
                    <button type="button" class="rounded-xl px-6 py-2.5 text-sm font-bold text-gray-500 hover:bg-gray-50 transition-all" onclick="closeModal()" th:text="#{form.btn.cancel}">Hủy bỏ</button>
                    <button type="submit" class="rounded-xl bg-helu-red px-6 py-2.5 text-sm font-bold text-white shadow-lg shadow-red-200 hover:bg-red-700 transition-all" th:text="#{form.btn.save}">Lưu thông tin</button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        const apiBase = '/api/leads';
        let allLeads = [];
        let filteredLeads = [];
        let currentPage = 1;
        const pageSize = 10;
        const unassignedText = /*[[#{status.unassigned}]]*/ 'Chưa gán';
        const addLeadText = /*[[#{manage.btn.add}]]*/ 'Thêm Lead mới';
        const updateLeadText = /*[[#{detail.btn.edit}]]*/ 'Cập nhật thông tin Lead';

        async function fetchLeads() {
            try {
                const response = await fetch(apiBase);
                allLeads = await response.json();
                filteredLeads = [...allLeads];
                currentPage = 1;
                renderLeads();
            } catch (error) { console.error('Error fetching leads:', error); }
        }

        function renderLeads() {
            const tbody = document.getElementById('leadsTable').querySelector('tbody');
            tbody.innerHTML = '';

            const totalRecords = filteredLeads.length;
            const totalPages = Math.ceil(totalRecords / pageSize);
            
            // Adjust current page if it is out of bounds
            if (currentPage > totalPages && totalPages > 0) {
                currentPage = totalPages;
            }

            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const paginatedLeads = filteredLeads.slice(startIndex, endIndex);

            if (paginatedLeads.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9" class="py-8 text-center text-sm font-medium text-gray-400">
                            Không tìm thấy khách hàng tiềm năng nào phù hợp.
                        </td>
                    </tr>
                `;
                document.getElementById('recordCount').innerText = 'Hiển thị 0/0 bản ghi';
                document.getElementById('paginationControls').innerHTML = '';
                return;
            }

            paginatedLeads.forEach(lead => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-50 hover:bg-gray-50/50 transition-all group cursor-pointer';
                tr.onclick = () => {
                    window.location.href = `/leads/${lead.leadId}`;
                };
                
                const statusColors = {
                    'New': 'bg-blue-50 text-blue-600 border-blue-100',
                    'In Progress': 'bg-amber-50 text-amber-600 border-amber-100',
                    'Won': 'bg-emerald-50 text-emerald-600 border-emerald-100',
                    'Lost': 'bg-rose-50 text-rose-600 border-rose-100'
                };
                tr.innerHTML = `
                    <td class="py-3 px-4 whitespace-nowrap">
                        <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">${lead.leadId}</span>
                    </td>
                    <td class="py-3 px-4 whitespace-nowrap">
                        <div class="font-bold text-gray-900 text-xs">${lead.fullName}</div>
                        <div class="text-[10px] font-medium text-gray-500">${lead.account}</div>
                    </td>
                    <td class="py-3 px-4 whitespace-nowrap">
                        <span class="inline-flex items-center rounded-lg bg-gray-100 px-2 py-0.5 text-[9px] font-bold text-gray-600">${lead.customerGroup || '-'}</span>
                    </td>
                    <td class="py-3 px-4 text-xs font-medium text-gray-600 whitespace-nowrap">${lead.industryType || '-'}</td>
                    <td class="py-3 px-4 text-xs font-medium text-gray-600 whitespace-nowrap">${lead.region || '-'}</td>
                    <td class="py-3 px-4 whitespace-nowrap">
                        <span class="inline-flex items-center rounded-full border px-2 py-0.5 text-[9px] font-bold uppercase tracking-wider ${statusColors[lead.status] || 'bg-gray-50 text-gray-600'}">
                            ${lead.status}
                        </span>
                    </td>
                    <td class="py-3 px-4 whitespace-nowrap">
                        <div class="flex items-center gap-1.5">
                            <div class="flex h-5 w-5 shrink-0 items-center justify-center rounded bg-helu-red font-bold text-white text-[9px]">${lead.userName ? lead.userName.charAt(0) : '?'}</div>
                            <span class="text-xs font-bold text-gray-700">${lead.userName || unassignedText}</span>
                        </div>
                    </td>
                    <td class="py-3 px-4 whitespace-nowrap">
                        <div class="text-[11px] font-bold text-gray-800">${lead.sourceName || '-'}</div>
                        <div class="text-[9px] font-medium text-gray-400">${lead.productName || '-'}</div>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Update record count text
            const startRecord = startIndex + 1;
            const endRecord = Math.min(endIndex, totalRecords);
            document.getElementById('recordCount').innerText = `Hiển thị ${startRecord}-${endRecord}/${totalRecords} bản ghi`;

            // Render pagination buttons
            const paginationControls = document.getElementById('paginationControls');
            paginationControls.innerHTML = '';
            if (totalPages > 1) {
                // Previous Button
                const prevBtn = document.createElement('button');
                prevBtn.type = 'button';
                prevBtn.className = `rounded-xl border border-gray-200 px-4 py-2 text-xs font-bold text-gray-500 hover:bg-gray-50 hover:text-helu-red transition-all ${currentPage === 1 ? 'opacity-50 cursor-not-allowed' : ''}`;
                prevBtn.innerText = 'Trước';
                if (currentPage > 1) {
                    prevBtn.onclick = () => { currentPage--; renderLeads(); };
                }
                paginationControls.appendChild(prevBtn);
                // Current Page Input Container (Middle)
                const pageContainer = document.createElement('div');
                pageContainer.className = 'flex items-center gap-1.5 rounded-xl border border-gray-200 bg-gray-50 px-3 py-1.5 text-xs font-bold text-gray-700 shadow-sm';
                pageContainer.innerHTML = `
                    <span>Trang</span>
                    <input type="number" id="pageInput" min="1" max="${totalPages}" value="${currentPage}" class="w-12 h-7 text-center border border-gray-300 rounded-lg focus:border-helu-red outline-none bg-white font-black" />
                    <span>/ ${totalPages}</span>
                `;
                paginationControls.appendChild(pageContainer);

                const pageInput = pageContainer.querySelector('#pageInput');
                pageInput.onchange = (e) => {
                    let val = parseInt(e.target.value);
                    if (isNaN(val) || val < 1) val = 1;
                    if (val > totalPages) val = totalPages;
                    currentPage = val;
                    renderLeads();
                };
                pageInput.onkeydown = (e) => {
                    if (e.key === 'Enter') {
                        pageInput.blur();
                    }
                };

                // Next Button
                const nextBtn = document.createElement('button');
                nextBtn.type = 'button';
                nextBtn.className = `rounded-xl border border-gray-200 px-4 py-2 text-xs font-bold text-gray-500 hover:bg-gray-50 hover:text-helu-red transition-all ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed' : ''}`;
                nextBtn.innerText = 'Sau';
                if (currentPage < totalPages) {
                    nextBtn.onclick = () => { currentPage++; renderLeads(); };
                }
                paginationControls.appendChild(nextBtn);
            }
            lucide.createIcons();
        }

        function viewDetail(id) { window.location.href = `/leads/${id}`; }

        function filterLeads() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const sort = document.getElementById('sortFilter').value;
            const date = document.getElementById('dateFilter').value;

            filteredLeads = allLeads.filter(l => {
                const matchesSearch = l.fullName.toLowerCase().includes(search) || 
                                     l.phoneNumber?.includes(search) || 
                                     l.account.toLowerCase().includes(search) ||
                                     l.leadId.toLowerCase().includes(search);
                const matchesStatus = !status || l.status === status;
                const matchesDate = !date || l.createdDate === date;
                return matchesSearch && matchesStatus && matchesDate;
            });

            if (sort === 'newest') filteredLeads.sort((a, b) => b.leadId.localeCompare(a.leadId));
            else filteredLeads.sort((a, b) => a.leadId.localeCompare(b.leadId));

            currentPage = 1;
            renderLeads();
        }

        let metadata = null;

        async function fetchMetadata() {
            try {
                const response = await fetch('/api/leads/metadata');
                metadata = await response.json();
                populateDropdowns();
            } catch (error) {
                console.error('Error fetching metadata:', error);
            }
        }

        function populateDropdowns() {
            if (!metadata) return;

            // Populate Customer Groups
            const groupSelect = document.getElementById('customerGroup');
            groupSelect.innerHTML = '<option value="">-- Chọn nhóm KH --</option>';
            metadata.customerGroups.forEach(g => {
                groupSelect.innerHTML += `<option value="${g}">${g}</option>`;
            });

            // Populate Industries
            const indSelect = document.getElementById('industryType');
            indSelect.innerHTML = '<option value="">-- Chọn ngành --</option>';
            metadata.industries.forEach(i => {
                indSelect.innerHTML += `<option value="${i}">${i}</option>`;
            });

            // Populate Regions
            const regSelect = document.getElementById('region');
            regSelect.innerHTML = '<option value="">-- Chọn khu vực --</option>';
            metadata.regions.forEach(r => {
                regSelect.innerHTML += `<option value="${r}">${r}</option>`;
            });

            // Populate Sources
            const srcSelect = document.getElementById('sourceName');
            srcSelect.innerHTML = '<option value="" disabled selected>-- Chọn nguồn KH --</option>';
            metadata.sources.forEach(s => {
                srcSelect.innerHTML += `<option value="${s}">${s}</option>`;
            });

            // Populate Products
            const prodSelect = document.getElementById('productName');
            prodSelect.innerHTML = '<option value="">-- Chọn sản phẩm --</option>';
            metadata.products.forEach(p => {
                prodSelect.innerHTML += `<option value="${p}">${p}</option>`;
            });

            // Populate Users
            const userSelect = document.getElementById('userId');
            userSelect.innerHTML = '<option value="" disabled selected>-- Chọn người phụ trách --</option>';
            metadata.users.forEach(u => {
                userSelect.innerHTML += `<option value="${u.userId}">${u.fullName}</option>`;
            });
        }

        async function openModal(mode, id = null) {
            const modal = document.getElementById('leadModal');
            const form = document.getElementById('leadForm');
            const title = document.getElementById('modalTitle');
            form.reset();
            document.getElementById('leadId').value = '';

            // Ensure dropdowns are populated
            populateDropdowns();

            if (mode === 'edit' && id) {
                title.innerText = updateLeadText;
                const lead = allLeads.find(l => l.leadId === id);
                if (lead) {
                    document.getElementById('leadId').value = lead.leadId;
                    document.getElementById('leadIdInput').value = lead.leadId;
                    document.getElementById('fullName').value = lead.fullName;
                    document.getElementById('phoneNumber').value = lead.phoneNumber || '';
                    document.getElementById('email').value = lead.email || '';
                    document.getElementById('customerRole').value = lead.customerRole || 'Manufacturer';
                    document.getElementById('location').value = lead.location || '';
                    document.getElementById('cost').value = lead.cost || 0;
                    document.getElementById('account').value = lead.account;
                    document.getElementById('status').value = lead.status;
                    document.getElementById('customerGroup').value = lead.customerGroup || '';
                    document.getElementById('industryType').value = lead.industryType || '';
                    document.getElementById('region').value = lead.region || '';
                    document.getElementById('sourceName').value = lead.sourceName || '';
                    document.getElementById('productName').value = lead.productName || '';
                    
                    if (metadata && metadata.users) {
                        const foundUser = metadata.users.find(u => u.fullName === lead.userName);
                        document.getElementById('userId').value = foundUser ? foundUser.userId : '';
                    }
                }
            } else {
                title.innerText = addLeadText;
                try {
                    const res = await fetch('/api/leads/next-id');
                    const nextIdData = await res.json();
                    document.getElementById('leadIdInput').value = nextIdData.nextId;
                } catch (err) {
                    console.error('Error fetching next lead ID:', err);
                    document.getElementById('leadIdInput').value = 'L-2026-' + Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                }
                document.getElementById('customerRole').value = 'Manufacturer';
                document.getElementById('location').value = 'Hồ Chí Minh';
                document.getElementById('cost').value = '0';
            }
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() { 
            const modal = document.getElementById('leadModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        document.getElementById('leadForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('leadId').value;
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${apiBase}/${id}` : apiBase;
            const lead = id ? allLeads.find(l => l.leadId === id) : null;

            const data = {
                leadId: document.getElementById('leadIdInput').value,
                fullName: document.getElementById('fullName').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                email: document.getElementById('email').value,
                account: document.getElementById('account').value,
                status: document.getElementById('status').value,
                customerRole: document.getElementById('customerRole').value,
                location: document.getElementById('location').value,
                cost: parseFloat(document.getElementById('cost').value) || 0,
                customerGroup: document.getElementById('customerGroup').value,
                industryType: document.getElementById('industryType').value,
                region: document.getElementById('region').value,
                productName: document.getElementById('productName').value,
                sourceName: document.getElementById('sourceName').value,
                createdDate: id ? lead.createdDate : new Date().toISOString().split('T')[0],
                userId: document.getElementById('userId').value || null,
                lossReason: id ? lead.lossReason : null,
                businessResult: id ? lead.businessResult : null
            };

            try {
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) { 
                    closeModal(); 
                    fetchLeads(); 
                } else {
                    const errText = await response.text();
                    alert("Lỗi lưu Lead: " + errText);
                }
            } catch (error) { 
                console.error('Error saving lead:', error); 
                alert("Lỗi kết nối: " + error.message);
            }
        };

        async function deleteLead(id) {
            if (confirm('Bạn có muốn xóa lead này?')) {
                try {
                    const response = await fetch(`${apiBase}/${id}`, { method: 'DELETE' });
                    if (response.ok) fetchLeads();
                } catch (error) { console.error('Error deleting lead:', error); }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchMetadata();
            fetchLeads();
        });
    </script>
</main>
</body>
</html>
